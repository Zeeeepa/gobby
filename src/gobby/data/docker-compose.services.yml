# Gobby service dependencies
# Installed via: gobby install
# Managed by daemon start/stop via Docker Compose profiles.

services:
  neo4j:
    image: neo4j:latest
    ports:
      - "8474:7474"
      - "8687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${GOBBY_NEO4J_PASSWORD:-gobbyneo4j}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - gobby_neo4j_data:/data
      - ./neo4j/conf:/var/lib/neo4j/conf
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${GOBBY_NEO4J_PASSWORD:-gobbyneo4j} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - neo4j
      - all

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${GOBBY_QDRANT_HTTP_PORT:-6333}:6333"
      - "${GOBBY_QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      # Auth disabled for local-only access (no TLS = no point in API key)
      # To enable: set QDRANT__SERVICE__API_KEY and configure TLS
      - QDRANT__LOG_LEVEL=${GOBBY_QDRANT_LOG_LEVEL:-WARN}
    volumes:
      - ./qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - qdrant
      - all

volumes:
  gobby_neo4j_data:

name: merge
description: |
  Merge agent: batch merges approved tasks into the target branch.
  Behavior enforced by inline step workflow.

version: "2.0"
enabled: false
isolation: none

instructions: |
  You are a merge agent spawned by an orchestrator pipeline.
  You work in the main repo and operate on task worktrees via MCP tools.

  Merge ALL review_approved tasks into the target branch.
  For each approved task (process in seq_num order):
  1. list_tasks(parent_task_id=..., status="review_approved") to find approved tasks
  2. list_worktrees(task_id=...) to find the task's worktree
  3. merge_worktree(worktree_id=...) to merge into target
  4. If conflicts: use gobby-merge tools to resolve. If unresolvable, escalate_task.
  5. Run the push_command from merge_worktree result
  6. auto_link_commits(task_id=..., since=task.created_at)
  7. close_task(task_id=..., changes_summary="Merged to {target}")
  8. delete_worktree(worktree_id=..., force=true)
  9. git fetch origin (before next merge)

  When all approved tasks are merged, call kill_agent to terminate.

  CRITICAL RULES:
  - Do NOT use raw git merge commands. Use ONLY merge_worktree MCP tool. Exception: you are allowed to run 'git fetch origin'.
  - Do NOT edit or write files — you only merge.
  - Do NOT stop or exit without calling kill_agent.
  - Use progressive discovery: list_mcp_servers → list_tools → get_tool_schema → call_tool.

step_variables:
  merge_complete: false

steps:
  - name: merge
    description: "Merge all approved tasks sequentially"
    status_message: |
      Merge all review_approved tasks into the target branch.
      For each task (in seq_num order):
      1. list_worktrees(task_id=...) to find the worktree
      2. merge_worktree(worktree_id=...) to merge
      3. Run the push_command from the result
      4. auto_link_commits(task_id=..., since="1 hour ago")
      5. close_task(task_id=..., changes_summary="Merged to {target}")
      6. delete_worktree(worktree_id=..., force=true)
      7. git fetch origin (before next merge)
      When all tasks merged, call kill_agent to terminate.
    allowed_tools:
      - Bash
      - Read
      - Glob
      - Grep
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    blocked_tools:
      - Write
      - Edit
    allowed_mcp_tools:
      - "gobby-worktrees:list_worktrees"
      - "gobby-worktrees:merge_worktree"
      - "gobby-worktrees:delete_worktree"
      - "gobby-tasks:list_tasks"
      - "gobby-tasks:close_task"
      - "gobby-tasks:auto_link_commits"
      - "gobby-tasks:escalate_task"
      - "gobby-merge:*"
      - "gobby-agents:kill_agent"
    transitions:
      - to: terminate
        when: "vars.merge_complete"

  - name: terminate
    description: "Self-terminate"
    status_message: "All merges complete. Call kill_agent to terminate."
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-agents:kill_agent"

exit_condition: "current_step == 'terminate'"

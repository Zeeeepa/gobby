name: merge
description: |
  Merge agent: merge approved branch into target, then report and shutdown.
  Worktree-first design — uses gobby-worktrees:merge_worktree when worktree_id is set,
  falls back to manual git merge otherwise.
  Does NOT handle cleanup — the coordinator pipeline deletes the worktree after merge.

version: "2.0"
enabled: false

imports: [worker-safety]

rule_definitions:
  no_agent_spawn:
    mcp_tools:
      - gobby-agents:spawn_agent
    reason: "Spawning agents is not allowed in merge workflow."
    action: block

  no_task_management:
    mcp_tools:
      - gobby-tasks:create_task
      - gobby-tasks:close_task
    reason: "Task management is not allowed. The coordinator handles this."
    action: block

variables:
  worktree_id: null
  clone_id: null
  branch_name: null
  target_branch: "0.2.23"
  merge_strategy: merge
  merge_complete: false
  parent_notified: false

steps:
  - name: merge
    description: "Merge branch into target"
    on_enter:
      # Worktree mode: merge via gobby-worktrees MCP tool
      - action: call_mcp_tool
        when: "variables.get('worktree_id')"
        server_name: gobby-worktrees
        tool_name: merge_worktree
        arguments:
          worktree_id: "{{ variables.worktree_id }}"
          target_branch: "{{ variables.target_branch }}"
        output_as: _merge_result

      - action: set_variable
        when: "variables.get('worktree_id')"
        name: merge_complete
        value: true

      # Clone mode: merge via gobby-clones MCP tool
      - action: call_mcp_tool
        when: "variables.get('clone_id') and not variables.get('worktree_id')"
        server_name: gobby-clones
        tool_name: merge_clone
        arguments:
          clone_id: "{{ variables.clone_id }}"
          target_branch: "{{ variables.target_branch }}"
        output_as: _merge_result

      - action: set_variable
        when: "variables.get('clone_id') and not variables.get('worktree_id')"
        name: merge_complete
        value: true

      # Fallback: manual merge instructions
      - action: inject_message
        when: "not variables.get('worktree_id') and not variables.get('clone_id')"
        content: |
          MERGE: Starting manual merge.

          Branch: {{ variables.branch_name }}
          Target: {{ variables.target_branch }}
          Strategy: {{ variables.merge_strategy }}

          Execute the merge:

          {% if variables.merge_strategy == 'squash' %}
          git checkout {{ variables.target_branch }}
          git merge --squash {{ variables.branch_name }}
          git commit -m "Merge {{ variables.branch_name }} (squashed)"
          {% elif variables.merge_strategy == 'rebase' %}
          git checkout {{ variables.branch_name }}
          git rebase {{ variables.target_branch }}
          git checkout {{ variables.target_branch }}
          git merge --ff-only {{ variables.branch_name }}
          {% else %}
          git checkout {{ variables.target_branch }}
          git merge {{ variables.branch_name }}
          {% endif %}

          After successful merge, set merge_complete to true:
          set_workflow_variable("merge_complete", true)

    allowed_tools:
      - Bash
      - Read
      - Edit
      - Glob
      - Grep
      - mcp__gobby__call_tool
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__search_tools

    allowed_mcp_tools:
      - gobby-worktrees:merge_worktree
      - gobby-clones:merge_clone

    transitions:
      - to: report_to_parent
        when: "variables.get('merge_complete', False)"

  - name: report_to_parent
    description: "Notify parent of merge completion via send_message"
    on_enter:
      - action: inject_message
        content: |
          MERGE: Reporting merge completion to parent.

          Send a completion message to your parent session:
          - server_name: "gobby-agents"
          - tool_name: "send_message"
          - arguments:
              from_session: "{{ session_id }}"
              to_session: "{{ session.parent_session_id }}"
              content: "Merge complete. Branch {{ variables.branch_name }} merged into {{ variables.target_branch }}."

    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__get_tool_schema
      - mcp__gobby__list_tools
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__search_tools

    allowed_mcp_tools:
      - gobby-agents:send_message

    on_mcp_success:
      - server: gobby-agents
        tool: send_message
        action: set_variable
        variable: parent_notified
        value: true

    on_mcp_error:
      - server: gobby-agents
        tool: send_message
        action: set_variable
        variable: parent_notified
        value: true

    transitions:
      - to: shutdown
        when: "parent_notified"

  - name: shutdown
    description: "Clean shutdown - MUST call kill_agent"
    on_enter:
      - action: inject_message
        content: |
          MERGE: Shutdown sequence - MANDATORY TERMINATION

          Merge is complete. You MUST now terminate by calling kill_agent.

          Step 1: Unlock kill_agent by fetching its schema:
            mcp__gobby__get_tool_schema(server_name="gobby-agents", tool_name="kill_agent")

          Step 2: Call kill_agent with your Gobby Session ID:
            mcp__gobby__call_tool(server_name="gobby-agents", tool_name="kill_agent", arguments={"session_id": "{{ session_id }}"})

    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__get_tool_schema
      - mcp__gobby__list_tools
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__search_tools

    allowed_mcp_tools:
      - gobby-agents:kill_agent

    on_premature_stop:
      action: block
      message: |
        BLOCKED: You cannot stop without calling kill_agent.
        Call kill_agent to exit. This is the ONLY way to end this session.

    transitions:
      - to: complete
        when: "mcp_called('gobby-agents', 'kill_agent')"

  - name: complete
    description: "Merge done"

exit_condition: "current_step == 'complete'"

on_premature_stop:
  action: block
  message: |
    Cannot stop - merge not complete.
    You must complete the merge and shutdown properly.

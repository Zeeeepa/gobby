name: researcher
description: |
  Web research agent. Searches the web, synthesizes findings, reports back to parent.
  Designed for fire-and-forget tasks spawned by pipelines or parent agents.

role: Web researcher and information synthesizer
goal: Find accurate, up-to-date information and present it clearly
personality: Efficient and thorough. Searches multiple sources. Summarizes concisely.
instructions: |
  Search the web for the requested information. Cross-reference multiple sources
  when possible. Present findings in a clean, structured format. When done,
  send results to parent and shut down.

mode: terminal
terminal: tmux
provider: claude
isolation: null
sandbox: null
timeout: 120.0
max_turns: 15

workflows:
  research:
    type: step
    description: "Web research workflow with prompt injection and clean shutdown"
    variables:
      research_complete: false
      parent_notified: false

    steps:
      - name: work
        description: "Execute the research task"
        on_enter:
          - action: inject_message
            content: |
              RESEARCH TASK:
              {{ variables.prompt | default('Execute the task assigned to you.') }}

              When finished, use send_to_parent to report your findings, then shut down.

        allowed_tools:
          - WebSearch
          - WebFetch
          - Read
          - Bash
          - Glob
          - Grep
          - mcp__gobby__call_tool
          - mcp__gobby__get_tool_schema
          - mcp__gobby__list_tools
          - mcp__gobby__list_mcp_servers
          - mcp__gobby__search_tools

        blocked_mcp_tools:
          - gobby-agents:spawn_agent

        on_mcp_success:
          - server: gobby-agents
            tool: send_to_parent
            action: set_variable
            variable: parent_notified
            value: true

        on_mcp_error:
          - server: gobby-agents
            tool: send_to_parent
            action: set_variable
            variable: parent_notified
            value: true

        transitions:
          - to: shutdown
            when: "parent_notified"

      - name: shutdown
        description: "Self-terminate"
        on_enter:
          - action: inject_message
            content: |
              Research complete and parent notified. Call kill_agent to terminate.
              mcp__gobby__call_tool(server_name="gobby-agents", tool_name="kill_agent", arguments={"session_id": "{{ session.id }}"})

        allowed_tools:
          - mcp__gobby__call_tool
          - mcp__gobby__get_tool_schema
          - mcp__gobby__list_tools
          - mcp__gobby__list_mcp_servers

        allowed_mcp_tools:
          - gobby-agents:kill_agent

        on_premature_stop:
          action: block
          message: "BLOCKED: Call kill_agent to exit."

        transitions:
          - to: complete
            when: "mcp_called('gobby-agents', 'kill_agent')"

      - name: complete
        description: "Done"

    exit_condition: "current_step == 'complete'"

default_workflow: research

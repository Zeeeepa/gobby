name: developer
description: |
  Developer agent: claim → implement → commit → report → shutdown.
  Developer marks task needs_review, does NOT close it.

version: "2.0"
enabled: false
priority: 20

imports: [worker-safety]

rule_definitions:
  no_agent_spawn:
    mcp_tools:
      - gobby-agents:spawn_agent
    reason: "Spawning agents is not allowed in developer workflow."
    action: block

  no_task_management:
    mcp_tools:
      - gobby-tasks:create_task
      - gobby-tasks:close_task
      - gobby-tasks:mark_task_review_approved
    reason: "Task creation, closing, and approval are not allowed. Let the parent handle task management."
    action: block

  no_push:
    commands:
      - pattern: "git push"
        reason: "Push is blocked. The parent orchestrator handles merging."
      - pattern: "git push *"
        reason: "Push is blocked. The parent orchestrator handles merging."
    action: block

variables:
  assigned_task_id: null
  task_claimed: false
  committed: false
  parent_notified: false

steps:
  - name: claim_task
    description: "Claim the assigned task"
    on_enter:
      - action: call_mcp_tool
        server_name: gobby-tasks
        tool_name: claim_task
        arguments:
          task_id: "{{ variables.assigned_task_id }}"
          session_id: "{{ session_id }}"
        output_as: _claim_result
      - action: call_mcp_tool
        server_name: gobby-tasks
        tool_name: get_task
        arguments:
          task_id: "{{ variables.assigned_task_id }}"
        output_as: _task_details
      - action: inject_message
        content: |
          DEVELOPER: Task claimed. Starting implementation.

          Task: {{ variables.assigned_task_id }}
          Task details have been loaded. Implement the task, write tests, and ensure they pass.

    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__get_tool_schema
      - mcp__gobby__list_tools
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__search_tools

    allowed_mcp_tools:
      - gobby-tasks:claim_task
      - gobby-tasks:get_task

    on_mcp_success:
      - server: gobby-tasks
        tool: claim_task
        action: set_variable
        variable: task_claimed
        value: true

    transitions:
      - to: implement
        when: "task_claimed"

  - name: implement
    description: "Implement the task — write code, tests, iterate until done"
    on_enter:
      - action: inject_message
        content: |
          DEVELOPER: IMPLEMENT — Write code and tests.

          Implement task {{ variables.assigned_task_id }}. You have full freedom to:
          - Read the codebase to understand context
          - Write implementation code
          - Write tests
          - Run tests and iterate until they pass
          - Save debugging insights to gobby-memory

          When implementation is complete and tests pass, proceed to commit:
            set_workflow_variable("implemented", true)

    allowed_tools: all

    blocked_mcp_tools:
      - gobby-agents:spawn_agent
      - gobby-tasks:create_task
      - gobby-tasks:close_task
      - gobby-tasks:mark_task_review_approved

    transitions:
      - to: commit
        when: "variables.get('implemented', False)"

  - name: commit
    description: "Commit and mark needs_review"
    on_enter:
      - action: inject_message
        content: |
          DEVELOPER: COMMIT — Stage, commit, and mark for review.

          1. Stage your changes: git add <files>
          2. Commit with task reference: git commit -m "[{{ project.name }}-{{ variables.assigned_task_id }}] Description"
          3. Link the commit:
             call_tool(server_name="gobby-tasks", tool_name="link_commit",
               arguments={"task_id": "{{ variables.assigned_task_id }}", "commit_sha": "<sha>"})
          4. Mark the task for review:
             call_tool(server_name="gobby-tasks", tool_name="mark_task_needs_review",
               arguments={"task_id": "{{ variables.assigned_task_id }}", "session_id": "{{ session_id }}"})

    allowed_tools:
      - Bash
      - Read
      - mcp__gobby__call_tool
      - mcp__gobby__get_tool_schema
      - mcp__gobby__list_tools
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__search_tools

    allowed_mcp_tools:
      - gobby-tasks:mark_task_needs_review
      - gobby-tasks:link_commit

    on_mcp_success:
      - server: gobby-tasks
        tool: mark_task_needs_review
        action: set_variable
        variable: committed
        value: true

    transitions:
      - to: report_to_parent
        when: "committed"

  - name: report_to_parent
    description: "Notify parent of completion via send_message"
    on_enter:
      - action: inject_message
        content: |
          DEVELOPER: Reporting completion to parent.

          Send a completion message to your parent session:
          - server_name: "gobby-agents"
          - tool_name: "send_message"
          - arguments:
              from_session: "{{ session_id }}"
              to_session: "{{ session.parent_session_id }}"
              content: "Task {{ variables.assigned_task_id }} development complete. Marked for review."

    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__get_tool_schema
      - mcp__gobby__list_tools
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__search_tools

    allowed_mcp_tools:
      - gobby-agents:send_message

    on_mcp_success:
      - server: gobby-agents
        tool: send_message
        action: set_variable
        variable: parent_notified
        value: true

    on_mcp_error:
      - server: gobby-agents
        tool: send_message
        action: set_variable
        variable: parent_notified
        value: true

    transitions:
      - to: shutdown
        when: "parent_notified"

  - name: shutdown
    description: "Clean shutdown - MUST call kill_agent"
    on_enter:
      - action: inject_message
        content: |
          DEVELOPER: Shutdown sequence - MANDATORY TERMINATION

          Your task is complete. You MUST now terminate by calling kill_agent.

          Step 1: Unlock kill_agent by fetching its schema:
            mcp__gobby__get_tool_schema(server_name="gobby-agents", tool_name="kill_agent")

          Step 2: Call kill_agent with your Gobby Session ID:
            mcp__gobby__call_tool(server_name="gobby-agents", tool_name="kill_agent", arguments={"session_id": "{{ session_id }}"})

    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__get_tool_schema
      - mcp__gobby__list_tools
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__search_tools

    allowed_mcp_tools:
      - gobby-agents:kill_agent

    on_premature_stop:
      action: block
      message: |
        BLOCKED: You cannot stop without calling kill_agent.
        Call kill_agent to exit. This is the ONLY way to end this session.

    transitions:
      - to: complete
        when: "mcp_called('gobby-agents', 'kill_agent')"

  - name: complete
    description: "Developer done"

exit_condition: "current_step == 'complete'"

on_premature_stop:
  action: block
  message: |
    Cannot stop - task not complete.
    You must implement, commit, and mark for review.

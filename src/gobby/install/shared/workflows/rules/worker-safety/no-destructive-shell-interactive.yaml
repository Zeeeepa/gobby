tags: [worker-safety, enforcement, default, gobby]

rules:
  no-recursive-rm-interactive:
    description: "Block recursive delete with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\brm\\s+(-\\w*r|--recursive)"
        reason: "Recursive delete is not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-secure-delete-interactive:
    description: "Block secure/permanent delete with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\b(shred|srm)\\b"
        reason: "Secure/permanent delete is not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-truncate-interactive:
    description: "Block file truncation with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\btruncate\\b|>\\s*['\"]?/"
        reason: "File truncation is not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-force-kill-interactive:
    description: "Block force-killing processes with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\bkill\\s+(-\\w*9|-KILL)|\\bkillall\\b"
        reason: "Force-killing processes is not allowed. Use graceful signals. Ask the user for permission to disable this rule if you need to proceed."

  no-recursive-permissions-interactive:
    description: "Block recursive permission changes with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\b(chmod|chown)\\s+.*-R\\b"
        reason: "Recursive permission changes are not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-dd-interactive:
    description: "Block low-level disk operations with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\bdd\\s+"
        reason: "Low-level disk operations are not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-npm-publish-interactive:
    description: "Block npm publish with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\bnpm\\s+publish\\b"
        reason: "Package publishing is not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-twine-upload-interactive:
    description: "Block twine upload with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\btwine\\s+upload\\b"
        reason: "Package publishing is not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-cargo-publish-interactive:
    description: "Block cargo publish with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\bcargo\\s+publish\\b"
        reason: "Package publishing is not allowed. Ask the user for permission to disable this rule if you need to proceed."

  no-gem-push-interactive:
    description: "Block gem push with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\bgem\\s+push\\b"
        reason: "Package publishing is not allowed. Ask the user for permission to disable this rule if you need to proceed."

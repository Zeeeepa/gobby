tags: [worker-safety, enforcement, default, gobby]

rules:
  no-npm-install-interactive:
    description: "Block npm install/add with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "\\bnpm\\s+(install|i|add)\\b"
        reason: "Package installation is blocked by default. Ask the user for permission to disable this rule if you need to proceed."

  no-npx-interactive:
    description: "Block npx with escape hatch for interactive sessions."
    event: before_tool
    enabled: false
    priority: 55
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block

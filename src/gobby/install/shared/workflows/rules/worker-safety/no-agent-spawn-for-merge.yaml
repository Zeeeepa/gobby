tags: [worker-safety, enforcement, agents, gobby]

rules:
  no-agent-spawn-for-merge:
    description: "Block agent spawning for merge agents"
    event: before_tool
    enabled: false
    agent_scope: [merge]
    effects:
      - type: block
        mcp_tools: ["gobby-agents:spawn_agent"]
        reason: "Spawning agents is not allowed in merge workflow."

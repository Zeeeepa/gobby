tags: [worker-safety, enforcement, gobby]

rules:
  no-destructive-git:
    description: "Block destructive git operations."
    event: before_tool
    enabled: false
    priority: 50
    when: "variables.get('is_spawned_agent')"
    effect:
      type: block
      tools: [Bash]
      command_pattern: "git\\s+(reset\\s+--hard|clean\\s+-[fdx]+|checkout\\s+(--\\s+)?\\.|restore\\s+\\.|branch\\s+-D|stash\\s+(drop|clear))"
      reason: "Destructive git operations are not allowed without explicit approval."

tags: [worker-safety, enforcement, agents, gobby]

rules:
  no-push-for-workers:
    description: "Block git push for developer and QA agents"
    event: before_tool
    enabled: true
    agent_scope: [developer, qa-reviewer]
    effects:
      - type: block
        tools: [Bash]
        command_pattern: "git\\s+push"
        reason: "Push is blocked. The merge agent handles pushing."

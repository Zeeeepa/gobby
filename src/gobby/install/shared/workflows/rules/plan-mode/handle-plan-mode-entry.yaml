tags: [plan-mode, state-tracking, gobby, default]

rules:
  handle-plan-mode-entry:
    description: "Set plan_mode=true and mode_level=0 when EnterPlanMode is called"
    event: after_tool
    enabled: false
    priority: 10
    when: "event.data.get('tool_name') == 'EnterPlanMode'"
    effects:
      - type: set_variable
        variable: plan_mode
        value: true
      - type: set_variable
        variable: mode_level
        value: 0

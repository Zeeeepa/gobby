tags: [plan-mode, state-tracking, gobby, default]

rules:
  handle-plan-mode-exit:
    description: "Clear plan_mode when ExitPlanMode succeeds (agent-initiated exit)"
    event: after_tool
    enabled: true
    priority: 10
    when: >
      event.data.get('tool_name') == 'ExitPlanMode'
      and not event.metadata.get('is_failure')
    effects:
      - type: set_variable
        variable: plan_mode
        value: false
      - type: set_variable
        variable: plan_skill_loaded
        value: false

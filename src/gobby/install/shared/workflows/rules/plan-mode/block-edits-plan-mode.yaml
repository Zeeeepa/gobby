tags: [plan-mode, enforcement, gobby, default]

rules:
  block-edits-plan-mode:
    description: "Block file edits during plan mode except for the plan file"
    event: before_tool
    enabled: true
    priority: 20
    when: >
      variables.get('plan_mode')
      and not is_plan_file(tool_input.get('file_path', ''), source)
    effects:
      - type: block
        tools: [Edit, Write, NotebookEdit]
        reason: |
          Plan mode is active — file edits are blocked.
          You may only edit the plan file itself.
          Use ExitPlanMode when your plan is finalized.

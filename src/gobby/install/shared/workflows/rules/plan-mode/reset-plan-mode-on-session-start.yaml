tags: [plan-mode, state-tracking, gobby, default]

rules:
  reset-plan-mode-on-session-start:
    description: "Clear plan_mode on new/clear/compact sessions"
    event: session_start
    enabled: false
    priority: 10
    when: "event.data.get('source') in ['clear', 'compact', 'startup']"
    effects:
      - type: set_variable
        variable: plan_mode
        value: false

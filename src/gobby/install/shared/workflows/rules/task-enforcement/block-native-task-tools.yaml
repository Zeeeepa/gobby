tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  block-native-task-tools:
    description: "Block CC native task/todo tools - use gobby-tasks instead"
    event: before_tool
    enabled: false
    priority: 30
    effect:
      type: block
      tools: [TaskCreate, TaskUpdate, TaskGet, TaskList, TodoWrite]
      reason: |
        CC native task tools are disabled. Use gobby-tasks MCP tools instead. Follow progressive discovery then:
        - create_task(title, description, session_id, claim=True)
        - claim_task(task_id, session_id)
        - list_ready_tasks()

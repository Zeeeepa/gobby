tags: [task-enforcement, enforcement, lifecycle, gobby, default]

rules:
  inject-creation-skill:
    description: "Inject task-creation and loading-skills on first agent turn"
    event: before_agent
    enabled: true
    priority: 25
    when: "not variables.get('task_creation_loaded')"
    effects:
      - type: mcp_call
        server: gobby-skills
        tool: get_skill
        arguments:
          name: task-creation
        inject_result: true
      - type: mcp_call
        server: gobby-skills
        tool: get_skill
        arguments:
          name: loading-skills
        inject_result: true
      - type: set_variable
        variable: task_creation_loaded
        value: true

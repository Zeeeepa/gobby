tags: [task-enforcement, enforcement, lifecycle, gobby, default]

rules:
  require-error-triage-before-status:
    description: "Gate task status transitions until all discovered errors, warnings, and failures are resolved"
    event: before_tool
    enabled: true
    priority: 50
    when: >
      not variables.get('plan_mode')
      and not variables.get('errors_resolved')
    effects:
      - type: block
        mcp_tools:
          - "gobby-tasks:close_task"
          - "gobby-tasks:mark_task_needs_review"
          - "gobby-tasks:mark_task_review_approved"
        reason: |
          Before changing task status, run lint and tests on files you touched
          and fix ALL errors, warnings, and failures you find — including
          pre-existing ones.

          You own every error, warning, and failure you see. Fix it. Do NOT
          be lazy and simply file a task without first thoroughly investigating
          the nature of the issue. If you can complete the fix this session
          without compaction, you must do it — not defer it. The only exception
          is something that genuinely requires multi-session planning with
          architectural changes across many files — and even then, investigate
          thoroughly before making that judgment call.

          Once all issues are resolved:
          set_variable(name="errors_resolved", value=true, session_id="<your Gobby Session ID>")

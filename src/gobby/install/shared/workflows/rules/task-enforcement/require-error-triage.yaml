tags: [task-enforcement, enforcement, lifecycle, gobby, default]

rules:
  require-error-triage-before-status:
    description: "Gate task status transitions until all discovered errors are resolved"
    event: before_tool
    enabled: false
    priority: 50
    when: >
      not variables.get('plan_mode')
      and not variables.get('errors_resolved')
    effects:
      - type: block
        mcp_tools:
          - "gobby-tasks:close_task"
          - "gobby-tasks:mark_task_needs_review"
          - "gobby-tasks:mark_task_review_approved"
        reason: |
          Before changing task status, run lint and tests on files you touched
          and fix ALL errors you find — including pre-existing ones.

          You own every error you see. Fix it. The only exception is something
          so complex it genuinely requires multi-session planning — and even then,
          try first.

          Once all errors are resolved:
          set_variable(name="errors_resolved", value=true, session_id="<your Gobby Session ID>")

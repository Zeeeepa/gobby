tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  block-needs-review-interactive:
    description: "Block mark_task_needs_review for interactive sessions"
    event: before_tool
    enabled: false
    priority: 32
    when: "not variables.get('is_spawned_agent')"
    effects:
      - type: block
        mcp_tools: ["gobby-tasks:mark_task_needs_review"]
        reason: |
          Interactive sessions should use close_task directly — the user is already present.
          mark_task_needs_review is for spawned/pipeline agents where a separate QA step reviews.

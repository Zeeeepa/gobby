tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  require-clean-tree-before-status:
    description: "Block status transitions when working tree has uncommitted changes"
    event: before_tool
    enabled: false
    priority: 31
    when: >
      variables.get('require_commit_before_status') and
      tool_input.get('reason', '') not in ['already_implemented', 'obsolete', 'duplicate', 'wont_fix', 'out_of_repo'] and
      has_dirty_files
    effects:
      - type: block
        mcp_tools:
          - "gobby-tasks:close_task"
          - "gobby-tasks:mark_task_needs_review"
          - "gobby-tasks:mark_task_review_approved"
        reason: |
          Uncommitted changes detected. Stage and commit dirty files before changing task status.
          1. git add <files>
          2. git commit -m "[{{ project.name }}-#N] description"

          Note: After committing, Gobby auto-detects the commit. If it doesn't, pass commit_sha to close_task().

  require-commit-before-status:
    description: "Block status transitions when no commit is linked to the task"
    event: before_tool
    enabled: false
    priority: 32
    when: >
      variables.get('require_commit_before_status') and
      tool_input.get('reason', '') not in ['already_implemented', 'obsolete', 'duplicate', 'wont_fix', 'out_of_repo'] and
      not variables.get('task_has_commits') and not tool_input.get('commit_sha') and
      (variables.get('session_edited_files', []) or has_dirty_files)
    effects:
      - type: block
        mcp_tools:
          - "gobby-tasks:close_task"
          - "gobby-tasks:mark_task_needs_review"
          - "gobby-tasks:mark_task_review_approved"
        reason: |
          No commit linked to this task. Gobby auto-detects commits from Bash `git commit`
          and from `link_commit()`. If you already committed, try again — if the issue
          persists, pass `commit_sha` explicitly to `close_task()`.

          If you have no code changes at all, pass a reason to skip the commit requirement:
          close_task(task_id="#N", reason="obsolete")
          Valid reasons: obsolete, duplicate, wont_fix, already_implemented, out_of_repo

tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  reset-subagent-flag:
    description: "Reset is_subagent on each user turn to prevent stale state from interrupted subagents"
    event: before_agent
    enabled: true
    priority: 5
    when: "variables.get('is_subagent')"
    effect:
      type: set_variable
      variable: is_subagent
      value: false

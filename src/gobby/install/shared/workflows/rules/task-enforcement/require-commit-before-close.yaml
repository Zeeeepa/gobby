tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  require-commit-before-close:
    description: "Require linked commit before close_task"
    event: before_tool
    enabled: false
    priority: 32
    when: "variables.get('require_commit_before_close') and not variables.get('task_has_commits') and not tool_input.get('commit_sha') and tool_input.get('reason') not in ['already_implemented', 'obsolete', 'duplicate', 'wont_fix', 'out_of_repo']"
    effects:
      - type: block
        mcp_tools: ["gobby-tasks:close_task"]
        reason: |
          A commit is required before closing this task.
          1. git commit -m "[{{ project.name }}-#N] description"
          2. close_task(task_id="#N", commit_sha="<sha>")

          No code changes? Pass a reason to skip the commit requirement:
          close_task(task_id="#N", reason="obsolete")
          Valid reasons: obsolete, duplicate, wont_fix, already_implemented, out_of_repo

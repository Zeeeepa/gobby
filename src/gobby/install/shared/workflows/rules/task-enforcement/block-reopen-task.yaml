tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  block-reopen-task:
    description: "Block reopen_task unless explicitly instructed by user"
    event: before_tool
    enabled: true
    priority: 30
    when: >-
      event.data.get('tool_name') in ('call_tool', 'mcp__gobby__call_tool')
      and tool_input.get('server_name') == 'gobby-tasks'
      and tool_input.get('tool_name') == 'reopen_task'
    effects:
      - type: block
        reason: |
          reopen_task is blocked. Do not unclaim tasks to avoid work.
          Only the user can instruct you to reopen a task.
          If you are stuck, escalate with mark_task_needs_review instead.

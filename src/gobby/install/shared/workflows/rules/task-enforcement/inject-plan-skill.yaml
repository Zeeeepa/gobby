tags: [task-enforcement, context, lifecycle, gobby, default]

rules:
  inject-plan-skill:
    description: "Inject plan skill when agent enters plan mode"
    event: after_tool
    enabled: true
    priority: 25
    when: >
      event.data.get('tool_name') in ('EnterPlanMode',)
      and not variables.get('plan_skill_loaded')
    effects:
      - type: mcp_call
        server: gobby-skills
        tool: get_skill
        arguments:
          name: plan
        inject_result: true
      - type: set_variable
        variable: plan_skill_loaded
        value: true

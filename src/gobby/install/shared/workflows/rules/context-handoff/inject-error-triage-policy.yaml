tags: [context-handoff, context, handoff, lifecycle, gobby, default]

rules:
  inject-error-triage-policy:
    description: "Inject error resolution policy on session start (skip on resume)"
    event: session_start
    enabled: true
    priority: 40
    when: "event.data.get('source') != 'resume'"
    effects:
      - type: inject_context
        template: |
          ## Error Resolution Policy

          You own every error you encounter during your session — lint failures,
          test failures, type errors, build errors, deprecation warnings. Fix them
          all before closing your task, even if they're pre-existing.

          The only exception: something so complex it genuinely requires
          multi-session planning. Even then, try first.

          Once all errors are resolved, call:
          set_variable(name="errors_resolved", value=true, session_id="<your Gobby Session ID>")

tags: [context-handoff, context, handoff, lifecycle, gobby, default]

rules:
  capture-baseline-dirty-files-on-start:
    description: "Capture baseline dirty files for session-aware commit detection"
    event: session_start
    enabled: true
    priority: 8
    effects:
      - type: mcp_call
        server: gobby-sessions
        tool: capture_baseline_dirty_files

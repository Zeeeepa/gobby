tags: [context-handoff, context, handoff, lifecycle, gobby, default]

rules:
  inject-compact-handoff:
    description: "Inject session summary context after compaction"
    event: session_start
    enabled: false
    priority: 11
    when: "event.data.get('source') == 'compact'"
    effects:
      - type: inject_context
        template: |
          ## Continuation Context
          *Injected by Gobby session handoff*

          {{ session_summary }}

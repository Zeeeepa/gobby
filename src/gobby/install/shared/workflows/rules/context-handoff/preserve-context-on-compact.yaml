tags: [context-handoff, context, handoff, lifecycle, gobby, default]

rules:
  preserve-context-on-compact:
    description: "Reset tracking and extract context before compaction"
    event: pre_compact
    enabled: false
    priority: 5
    when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
    effects:
      - type: set_variable
        variable: injected_memory_ids
        value: []
      - type: set_variable
        variable: pending_context_reset
        value: true
      - type: set_variable
        variable: handoff_source
        value: "compact"
      - type: mcp_call
        server: gobby-memory
        tool: extract_from_session
        arguments:
          max_memories: 5

tags: [context-handoff, context, handoff, lifecycle, gobby, default]

rules:
  inject-task-context-on-start:
    description: "Inject active task context if session has a claimed task (skip on resume)"
    event: session_start
    enabled: true
    priority: 31
    when: "event.data.get('source') != 'resume'"
    effects:
      - type: inject_context
        template: |
          {{ task_context }}

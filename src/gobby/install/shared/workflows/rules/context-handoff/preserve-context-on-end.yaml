tags: [context-handoff, context, handoff, lifecycle, gobby, default]

rules:
  preserve-context-on-end:
    description: "Extract memories on session end"
    event: session_end
    enabled: false
    priority: 10
    effects:
      - type: mcp_call
        server: gobby-memory
        tool: extract_from_session
        arguments:
          max_memories: 5

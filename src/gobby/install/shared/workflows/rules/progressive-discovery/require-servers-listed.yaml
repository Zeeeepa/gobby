tags: [progressive-discovery, enforcement, mcp, gobby, default]

rules:
  require-servers-listed:
    description: "Auto-heal: run list_mcp_servers before list_tools if not yet called"
    event: before_tool
    enabled: false
    priority: 20
    when: "event.data.get('tool_name') in ('list_tools', 'mcp__gobby__list_tools') and variables.get('enforce_tool_schema_check') and not variables.get('servers_listed')"
    effects:
      - type: mcp_call
        server: _proxy
        tool: list_mcp_servers
        inject_result: true
        block_on_failure: true
      - type: set_variable
        variable: servers_listed
        value: true

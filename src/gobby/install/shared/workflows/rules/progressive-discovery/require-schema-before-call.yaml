tags: [progressive-discovery, enforcement, mcp, gobby, default]

rules:
  require-schema-before-call:
    description: "Block call_tool if get_tool_schema has not been called for this tool"
    event: before_tool
    enabled: true
    priority: 22
    when: "event.data.get('tool_name') in ('call_tool', 'mcp__gobby__call_tool') and variables.get('enforce_tool_schema_check') and not is_discovery_tool(tool_input.get('tool_name')) and not is_tool_unlocked(tool_input)"
    effects:
      - type: block
        reason: >-
          Run get_tool_schema(server_name='{{ tool_input.get('server_name', '?') }}', tool_name='{{ tool_input.get('tool_name', '?') }}') first.
          You only need to do this once per tool.

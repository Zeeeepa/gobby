tags: [skill-discovery, context, gobby, default]

rules:
  suggest-skills-on-prompt:
    description: "Search installed skills and inject top matches + hub search nudge"
    event: before_agent
    enabled: false
    priority: 35
    effects:
      - type: mcp_call
        server: gobby-skills
        tool: search_skills
        arguments:
          top_k: 5
        background: false
        inject_result: true

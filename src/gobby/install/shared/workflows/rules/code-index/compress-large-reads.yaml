tags: [code-index, gobby, default]

rules:
  code-index-compress-reads:
    description: "Replace large Read outputs with symbol outlines"
    event: after_tool
    enabled: false
    priority: 40
    when: >
      event.data.get('tool_name') == 'Read'
      and len(event.data.get('tool_output', '')) > 20000
    conditions:
      - "variables.get('code_index_available', False)"
      - "variables.get('servers_listed', False)"
      - "not variables.get('is_spawned_agent')"
    effects:
      - type: compress_output
        strategy: code_index

tags: [code-index, gobby, default]

rules:
  block-grep-on-indexed-files:
    description: "Block Grep/Glob in projects with a code index to push agents toward gobby-code symbol search"
    event: before_tool
    enabled: true
    priority: 50
    when: >
      event.data.get('tool_name', '').lower() in ('grep_search', 'glob', 'grep')
    conditions:
      - "variables.get('code_index_available', False)"
      - "variables.get('servers_listed', False)"
    effects:
      - type: block
        reason: >
          This project has a code index. Use `gobby-code` instead:
          - `search_symbols(query)` — find definitions or concepts
          - `get_file_outline(file_path)` — see a file's structure
          - `get_symbol(symbol_id)` — retrieve specific source code

          For non-code searches (logs, config, text patterns), use Bash `grep` directly.

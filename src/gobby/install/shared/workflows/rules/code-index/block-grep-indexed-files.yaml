tags: [code-index, gobby, default]

rules:
  block-grep-on-indexed-files:
    description: "Block grep/glob when targeting indexed file extensions to force gobby-code usage"
    event: before_tool
    enabled: true
    priority: 50
    when: >
      event.data.get('tool_name') in ('grep_search', 'glob', 'Grep', 'Glob')
      and any(ext in str(event.data.get('tool_input', {})).lower() 
              for ext in ['.rake', '.mjs', '.ts', '.cs', '.c', '.cc', '.hh', '.js', '.dart', '.ex', '.php', '.py', '.cjs', '.cxx', '.go', '.jsx', '.exs', '.h', '.hpp', '.java', '.tsx', '.rs', '.gemspec', '.rb', '.cpp', '.hxx', '.pyi', '.md', '.yaml', '.yml'])
    conditions:
      - "variables.get('code_index_available', False)"
    effects:
      - type: block
        reason: >
          Direct text search (grep/glob) is blocked for this file extension to save context. 
          Use the `gobby-code` MCP server instead.
          - Call `search_symbols(query)` to find definitions or concepts.
          - Call `get_file_outline(file_path)` to see a file's structure.

tags: [code-index, gobby, default]

rules:
  inject-code-index-skill:
    description: "Inject code-index skill on first Grep to teach agent about gcode"
    event: before_tool
    enabled: false
    priority: 50
    when: >
      event.data.get('tool_name', '').lower() in ('grep_search', 'grep')
      and not variables.get('code_index_loaded')
    effects:
      - type: mcp_call
        server: gobby-skills
        tool: get_skill
        arguments:
          name: code-index
        inject_result: true
      - type: set_variable
        variable: code_index_loaded
        value: true

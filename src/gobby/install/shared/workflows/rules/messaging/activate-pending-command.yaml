tags: [messaging, p2p, commands, gobby, default]

rules:
  activate-pending-command:
    description: "Activate a pending command when agent starts a turn"
    event: before_agent
    enabled: false
    priority: 15
    when: "variables.get('is_spawned_agent') and variables.get('has_pending_command')"
    effects:
      - type: mcp_call
        server: gobby-agents
        tool: activate_command

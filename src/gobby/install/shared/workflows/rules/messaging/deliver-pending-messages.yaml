tags: [messaging, p2p, commands, gobby, default]

rules:
  deliver-pending-messages:
    description: "Deliver pending inter-session messages on each agent turn"
    event: before_agent
    enabled: true
    when: "variables.get('is_spawned_agent')"
    priority: 10
    effects:
      - type: mcp_call
        server: gobby-agents
        tool: deliver_pending_messages

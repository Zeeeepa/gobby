tags: [stop-gates, enforcement, lifecycle, gobby, default]

rules:
  codex-review-gate-init:
    description: "Initialize codex review gate from daemon config on session start"
    event: session_start
    enabled: true
    priority: 5
    effect:
      type: set_variable
      variable: codex_review_gate_enabled
      value: "config.get('codex_review_gate_enabled', False)"

  codex-review-gate:
    description: "Block stop until Codex review passes (opt-in via codex-setup skill)"
    event: stop
    enabled: true
    priority: 45
    when: >
      variables.get('codex_review_gate_enabled')
      and not variables.get('codex_review_gate_passed')
      and not variables.get('plan_mode')
      and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts', 8)
    effects:
      - type: block
        reason: |
          Codex review gate is enabled. Before stopping, run a Codex review:

          ```bash
          codex review --uncommitted
          ```

          If review passes, set the gate variable:
          `set_variable(name="codex_review_gate_passed", value=true)`

          If review finds issues, fix them first, then re-run the review.

          Use `/gobby skill codex-review` for detailed review instructions
          including adversarial review mode.

tags: [stop-gates, enforcement, lifecycle, gobby, default]

rules:
  require-step-completion:
    description: "Block agent stop if step workflow is not complete"
    event: stop
    enabled: false
    priority: 49
    when: >-
      variables.get('is_spawned_agent')
      and not variables.get('step_workflow_complete')
      and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts', 8)
    effects:
      - type: block
        reason: >-
          Step workflow not complete. Continue with your current step
          before stopping. Current step: {{ variables.get('current_step', 'unknown') }}.

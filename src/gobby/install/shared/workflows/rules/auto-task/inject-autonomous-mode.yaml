tags: [auto-task, task, autonomous, lifecycle, gobby, default]

rules:
  inject-autonomous-mode:
    description: "Inject autonomous task execution context when auto_task_ref is set"
    event: before_agent
    enabled: false
    priority: 60
    when: "variables.get('auto_task_ref')"
    effects:
      - type: inject_context
        template: |
          You are in autonomous task execution mode.

          Auto-task: {{ variables.auto_task_ref or '(unknown)' }}

          Work on this task and its subtasks until completion.
          Use suggest_next_task() to find available work.
          When {{ variables.auto_task_ref or '(unknown)' }} is completed, you may stop.

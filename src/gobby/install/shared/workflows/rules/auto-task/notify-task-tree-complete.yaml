tags: [auto-task, task, autonomous, lifecycle, gobby, default]

rules:
  notify-task-tree-complete:
    description: "Inject completion notice when task tree is fully closed"
    event: stop
    enabled: false
    priority: 61
    when: "variables.get('auto_task_ref') and task_tree_complete(variables.get('auto_task_ref'))"
    effects:
      - type: inject_context
        template: |
          Task {{ variables.auto_task_ref or '(unknown)' }} complete! All subtasks have been closed.
          This is a good opportunity to do a quick code review of the task tree.
          Any errors or warnings should be addressed before closing.
          You may now close the task using close_task().

          
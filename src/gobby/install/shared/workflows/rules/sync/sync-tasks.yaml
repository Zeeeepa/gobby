tags: [sync, lifecycle, gobby, default]

rules:
  task-sync-import-on-start:
    description: "Import tasks from .gobby/tasks.jsonl on session start"
    event: session_start
    enabled: false
    priority: 20
    effects:
      - type: mcp_call
        server: gobby-tasks
        tool: sync_import

  task-sync-export-on-end:
    description: "Export tasks to .gobby/tasks.jsonl on session end"
    event: session_end
    enabled: false
    priority: 50
    effects:
      - type: mcp_call
        server: gobby-tasks
        tool: sync_export

  task-sync-export-on-compact:
    description: "Export tasks to .gobby/tasks.jsonl before compaction"
    event: pre_compact
    enabled: false
    priority: 50
    when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
    effects:
      - type: mcp_call
        server: gobby-tasks
        tool: sync_export

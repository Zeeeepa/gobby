tags: [tool-hygiene, enforcement, python, gobby, default]

rules:
  track-pending-memory-review:
    description: "Reset memory_review_completed flag after file edits"
    event: after_tool
    enabled: false
    priority: 90
    when: "event.data.get('tool_name') in ['Edit', 'Write', 'NotebookEdit']"
    effects:
      - type: set_variable
        variable: memory_review_completed
        value: false

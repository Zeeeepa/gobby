tags: [output-compression, token-optimization, gobby, default]

rules:
  compress-bash-output:
    description: "Rewrite verbose Bash commands through gsqz output compressor"
    event: before_tool
    enabled: true
    priority: 50
    when: >
      event.data.get('tool_name') in ('Bash', 'run_shell_command')
      and not event.data.get('tool_input', {}).get('command', '').lstrip().startswith('gcode')
    effects:
      - type: rewrite_input
        input_updates:
          command: "{{ gsqz_bin }} -- {{ event.data.tool_input.command | shlex_quote }}"
        auto_approve: true

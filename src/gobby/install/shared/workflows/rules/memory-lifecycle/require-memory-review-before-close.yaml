tags: [memory-lifecycle, enforcement, gobby, default]

rules:
  require-memory-review-before-close:
    description: "Gate task close until agent reviews memories (when edits were made)"
    event: before_tool
    enabled: false
    priority: 50
    when: >
      event.data.get('mcp_tool') == 'close_task'
      and not variables.get('plan_mode')
      and variables.get('pending_memory_review')
      and ((event.data.get('tool_input') or {}).get('arguments') or {}).get('commit_sha')
    effect:
      type: block
      reason: |
        Consider saving any valuable memories from this task before closing.
        Use `create_memory` (via gobby-memory MCP) for insights worth preserving.
        If nothing new was learned, no action needed.

        Do NOT create memories for bugs, errors, or issues you encounter.
        Create tasks instead so they get fixed.

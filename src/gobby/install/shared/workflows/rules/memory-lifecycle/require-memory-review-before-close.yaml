tags: [memory-lifecycle, enforcement, gobby, default]

rules:
  require-memory-review-before-close:
    description: "Gate task close until agent reviews memories (when edits were made)"
    event: before_tool
    enabled: false
    priority: 50
    when: >
      event.data.get('mcp_tool') == 'close_task'
      and not variables.get('plan_mode')
      and variables.get('pending_memory_review')
      and ((event.data.get('tool_input') or {}).get('arguments') or {}).get('commit_sha')
    effects:
      - type: block
        reason: |
          Consider saving any valuable memories from this task before closing.
          Use `create_memory` (via gobby-memory MCP) for insights worth preserving.

          Also verify any stale memories you encountered during this session were
          cleaned up. Stale memories (outdated facts, references to fixed bugs,
          superseded patterns) cause harmful feedback loops — future agents treat
          them as current truth. Use `delete_memory` to remove them.

          If nothing new was learned and no stale memories remain, clear the gate:
          `set_variable(name="pending_memory_review", value=false, session_id="<your Gobby Session ID>")`

          Do NOT create memories for bugs, errors, or issues you encounter.
          Create tasks instead so they get fixed.

  require-memory-review-before-needs-review:
    description: "Gate mark_task_needs_review until agent reviews memories (when edits were made)"
    event: before_tool
    enabled: false
    priority: 50
    when: >
      event.data.get('mcp_tool') == 'mark_task_needs_review'
      and not variables.get('plan_mode')
      and variables.get('pending_memory_review')
    effects:
      - type: block
        reason: |
          Consider saving any valuable memories from this task before submitting for review.
          Use `create_memory` (via gobby-memory MCP) for insights worth preserving.

          Also verify any stale memories you encountered during this session were
          cleaned up via `delete_memory`. Stale memories cause harmful feedback loops.

          If nothing new was learned and no stale memories remain, clear the gate:
          `set_variable(name="pending_memory_review", value=false, session_id="<your Gobby Session ID>")`

          Do NOT create memories for bugs or errors — create tasks instead.

  require-memory-review-before-approve:
    description: "Gate mark_task_review_approved until agent reviews memories (when edits were made)"
    event: before_tool
    enabled: false
    priority: 50
    when: >
      event.data.get('mcp_tool') == 'mark_task_review_approved'
      and not variables.get('plan_mode')
      and variables.get('pending_memory_review')
    effects:
      - type: block
        reason: |
          Consider saving any valuable memories from this review before approving.
          Use `create_memory` (via gobby-memory MCP) for insights worth preserving.

          Also verify any stale memories you encountered during this session were
          cleaned up via `delete_memory`. Stale memories cause harmful feedback loops.

          If nothing new was learned and no stale memories remain, clear the gate:
          `set_variable(name="pending_memory_review", value=false, session_id="<your Gobby Session ID>")`

          Do NOT create memories for bugs or errors — create tasks instead.

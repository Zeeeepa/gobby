tags: [memory-lifecycle, enforcement, gobby, default]

rules:
  clear-memory-review-on-create:
    description: "Set memory_review_completed flag when create_memory is called"
    event: before_tool
    enabled: true
    priority: 85
    when: "event.data.get('mcp_tool') == 'create_memory' and event.data.get('mcp_server') == 'gobby-memory'"
    effects:
      - type: set_variable
        variable: memory_review_completed
        value: true

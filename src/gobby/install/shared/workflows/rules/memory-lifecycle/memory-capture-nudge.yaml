tags: [memory-lifecycle, memory, lifecycle, gobby, default]

rules:
  memory-capture-nudge:
    description: "Nudge agent to save user preferences or facts as memories"
    event: before_agent
    enabled: false
    priority: 50
    when: "len((event.data.get('prompt') or '').strip()) >= 10 and not (event.data.get('prompt') or '').strip().startswith('/')"
    effect:
      type: inject_context
      template: |
        If the user just told you something worth remembering across sessions
        (a preference, fact, convention, or instruction), save it with
        create_memory on gobby-memory. If not, carry on.

        Do NOT generalize one-time instructions into conventions. Only save
        if the user explicitly asked you to remember, or the fact would
        require multi-step exploration to rediscover. It's fine to save nothing.

        Do NOT create memories for bugs, errors, or issues you encounter.
        Create tasks instead so they get fixed.

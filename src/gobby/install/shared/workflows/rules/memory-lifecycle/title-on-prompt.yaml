tags: [memory-lifecycle, memory, lifecycle, title, gobby, default]

rules:
  title-on-prompt:
    description: "Synthesize session title from user prompt"
    event: before_agent
    enabled: false
    priority: 12
    when: "not variables.get('session_title_set')"
    effects:
      - type: mcp_call
        server: gobby-sessions
        tool: synthesize_title_from_prompt
        background: true

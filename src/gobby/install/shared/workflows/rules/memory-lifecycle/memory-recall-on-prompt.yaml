tags: [memory-lifecycle, memory, lifecycle, gobby, default]

rules:
  memory-recall-on-prompt:
    description: "Search and inject relevant memories before agent prompt"
    event: before_agent
    enabled: true
    priority: 10
    effects:
      - type: mcp_call
        server: gobby-memory
        tool: search_memories
        arguments:
          limit: 5
        background: false
        inject_result: true

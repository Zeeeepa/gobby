name: command-listener
type: pipeline
version: "1.0"
description: |
  Command processing loop. Sends "ready" to parent, waits for a command,
  processes it via LLM, sends result back, and loops until exit_condition
  is set on a command or max iterations reached.

inputs:
  parent_session_id: null
  wait_timeout: 600
  max_iterations: 50
  _current_iteration: 0

steps:
  - id: check_limit
    condition: "${{ inputs._current_iteration >= inputs.max_iterations }}"
    exec: "echo 'Max iterations reached' && exit 1"

  - id: notify_ready
    condition: "${{ inputs._current_iteration < inputs.max_iterations }}"
    mcp:
      server: gobby-agents
      tool: send_message
      arguments:
        from_session: "${{ session_id }}"
        to_session: "${{ inputs.parent_session_id }}"
        content: "Ready for command (iteration ${{ inputs._current_iteration }})"

  - id: wait_command
    condition: "${{ inputs._current_iteration < inputs.max_iterations }}"
    mcp:
      server: gobby-agents
      tool: wait_for_command
      arguments:
        session_id: "${{ session_id }}"
        timeout: "${{ inputs.wait_timeout }}"

  - id: process_command
    condition: "${{ steps.wait_command.output.command }}"
    prompt: |
      Execute the following command from your parent session:
      ${{ steps.wait_command.output.command.command_text }}

  - id: complete_command
    condition: "${{ steps.wait_command.output.command }}"
    mcp:
      server: gobby-agents
      tool: complete_command
      arguments:
        session_id: "${{ session_id }}"
        command_id: "${{ steps.wait_command.output.command.id }}"
        result: "${{ steps.process_command.output.response }}"

  - id: next_iteration
    condition: "${{ steps.wait_command.output.command and not steps.wait_command.output.command.exit_condition }}"
    invoke_pipeline:
      name: command-listener
      arguments:
        parent_session_id: "${{ inputs.parent_session_id }}"
        wait_timeout: "${{ inputs.wait_timeout }}"
        max_iterations: "${{ inputs.max_iterations }}"
        _current_iteration: "${{ inputs._current_iteration + 1 }}"

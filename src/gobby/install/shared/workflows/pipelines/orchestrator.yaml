name: orchestrator
type: pipeline
version: "4.0"
description: |
  Full orchestration pipeline: expand epic → create worktree → dev/QA loop → merge.
  Thin wrapper around dev-loop — handles expansion and worktree creation, then
  delegates the actual dispatch cycle. Auto-merges on completion.

  If _worktree_id is already set (continuation or manual override), skips
  expansion and worktree creation and goes straight to dev-loop.

  Supports both epics (tasks with children) and standalone tasks.

  Do NOT use wait_for_completion — use run_pipeline with
  continuation_prompt instead.

outputs:
  iteration: "${{ dev_loop.output.iteration }}"
  orchestration_complete: "${{ dev_loop.output.orchestration_complete }}"
  session_task: "${{ dev_loop.output.session_task }}"
  is_standalone: "${{ dev_loop.output.is_standalone }}"

inputs:
  session_task: null
  developer_agent: "developer"
  qa_agent: "qa-reviewer"
  developer_provider: "claude"
  qa_provider: "claude"
  developer_model: null
  qa_model: null
  merge_target: "main"
  merge_agent: "merge"
  merge_provider: "claude"
  merge_model: null
  wait_timeout: 600
  max_concurrent: 5
  max_iterations: 200
  _current_iteration: 0
  _worktree_id: null
  _clone_id: null
  _continuation_prompt: null

steps:
  - id: fetch_origin
    exec: "git fetch origin"

  # --- Get task info (first iteration only, for branch naming) ---
  - id: get_epic
    condition: "${{ not inputs._worktree_id and not inputs._clone_id }}"
    mcp:
      server: gobby-tasks
      tool: get_task
      arguments:
        task_id: "${{ inputs.session_task }}"

  # --- Expand epic if not yet expanded (first iteration only, epics only) ---
  - id: expand_epic
    condition: "${{ (not inputs._worktree_id and not inputs._clone_id) and (get_epic.output.is_expanded == false) and (get_epic.output.task_type == 'epic') }}"
    invoke_pipeline:
      name: expand-task
      arguments:
        task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"

  # --- CREATE WORKTREE (first iteration only, skip if clone provided) ---
  # Quick scan to see if there are tasks to work on before creating worktree
  - id: scan_open_for_worktree
    condition: "${{ not inputs._worktree_id and not inputs._clone_id }}"
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "open"

  - id: create_worktree
    condition: "${{ (not inputs._worktree_id and not inputs._clone_id) and (len(scan_open_for_worktree.output.tasks) > 0 if scan_open_for_worktree.output else false) }}"
    mcp:
      server: gobby-worktrees
      tool: create_worktree
      arguments:
        branch_name: "${{ 'task-' + str(get_epic.output.seq_num) if get_epic.output.task_type != 'epic' else 'epic-' + str(get_epic.output.seq_num) }}"
        base_branch: "${{ inputs.merge_target }}"
        task_id: "${{ inputs.session_task }}"
        use_local: true
        provider: "${{ inputs.developer_provider }}"

  # --- DELEGATE TO DEV-LOOP ---
  - id: dev_loop
    invoke_pipeline:
      name: dev-loop
      arguments:
        session_task: "${{ inputs.session_task }}"
        worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
        clone_id: "${{ inputs._clone_id }}"
        merge_target: "${{ inputs.merge_target }}"
        developer_agent: "${{ inputs.developer_agent }}"
        qa_agent: "${{ inputs.qa_agent }}"
        developer_provider: "${{ inputs.developer_provider }}"
        qa_provider: "${{ inputs.qa_provider }}"
        developer_model: "${{ inputs.developer_model }}"
        qa_model: "${{ inputs.qa_model }}"
        max_concurrent: "${{ inputs.max_concurrent }}"
        max_iterations: "${{ inputs.max_iterations }}"
        _current_iteration: "${{ inputs._current_iteration }}"
        _continuation_prompt: "${{ inputs._continuation_prompt }}"

  # --- MERGE (after dev-loop completes) ---
  - id: spawn_merge
    condition: "${{ dev_loop.output.orchestration_complete and (inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') or inputs._clone_id) }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Merge into ${{ inputs.merge_target }}. Use merge_worktree with push=true or merge_clone depending on your isolation type."
        agent: "${{ inputs.merge_agent }}"
        worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
        clone_id: "${{ inputs._clone_id }}"
        provider: "${{ inputs.merge_provider }}"
        model: "${{ inputs.merge_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal


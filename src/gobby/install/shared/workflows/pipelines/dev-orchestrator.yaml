name: dev-orchestrator
type: pipeline
version: "1.0"
description: |
  Simplified tick-based orchestration: dispatches developer agents only.
  No QA, no merge, no epic close. Work stays on the isolation branch
  for manual review and merge.

  "Done" = no open or in_progress tasks remaining.

outputs:
  orchestration_complete: "${{ done_check.output.orchestration_complete if done_check.output else false }}"
  is_standalone: "${{ standalone_check.output.is_standalone if standalone_check.output else false }}"
  open_count: "${{ len(scan_open.output.tasks) if scan_open.output else 0 }}"
  in_progress_count: "${{ len(scan_in_progress.output.tasks) if scan_in_progress.output else 0 }}"

inputs:
  task_id: null
  developer_agent: "developer"
  developer_provider: "claude"
  developer_model: null
  agent_timeout: 1200
  max_concurrent: 5
  isolation: "worktree"

steps:
  # --- RE-ENTRANCY GUARD ---
  - id: reentry_check
    mcp:
      server: gobby-workflows
      tool: list_pipeline_executions
      arguments:
        pipeline_name: "dev-orchestrator"
        status: "running"

  - id: reentry_gate
    condition: "${{ len(reentry_check.output.executions) > 1 }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "Skipped: another dev-orchestrator execution is already running"

  # --- FETCH ORIGIN ---
  - id: fetch_origin
    exec: "git fetch origin"

  # --- SCAN CHILD TASKS ---
  - id: scan_open
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.task_id }}"
        status: "open"

  - id: scan_in_progress
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.task_id }}"
        status: "in_progress"

  # --- DETECT STANDALONE vs EPIC ---
  - id: standalone_check
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          is_standalone: "${{ len(scan_open.output.tasks) == 0 and len(scan_in_progress.output.tasks) == 0 }}"

  - id: get_standalone_task
    condition: "${{ standalone_check.output.is_standalone }}"
    mcp:
      server: gobby-tasks
      tool: get_task
      arguments:
        task_id: "${{ inputs.task_id }}"

  # --- CHECK COMPLETION ---
  - id: done_check
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          orchestration_complete: >-
            ${{
              (standalone_check.output.is_standalone and get_standalone_task.output and get_standalone_task.output.status in ('closed', 'needs_review', 'review_approved'))
              or
              (not standalone_check.output.is_standalone and len(scan_open.output.tasks) == 0 and len(scan_in_progress.output.tasks) == 0)
            }}

  # --- ISOLATION: get existing worktree or clone ---
  - id: get_worktree
    condition: "${{ inputs.isolation == 'worktree' }}"
    mcp:
      server: gobby-worktrees
      tool: get_worktree_by_task
      arguments:
        task_id: "${{ inputs.task_id }}"

  - id: get_clone
    condition: "${{ inputs.isolation == 'clone' }}"
    mcp:
      server: gobby-clones
      tool: get_clone_by_task
      arguments:
        task_id: "${{ inputs.task_id }}"

  - id: has_isolation
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          exists: "${{ bool(get_worktree.output and get_worktree.output.worktree) or bool(get_clone.output and get_clone.output.clone) }}"

  - id: get_task_info
    condition: "${{ not done_check.output.orchestration_complete and not has_isolation.output.exists }}"
    mcp:
      server: gobby-tasks
      tool: get_task
      arguments:
        task_id: "${{ inputs.task_id }}"

  # --- ISOLATION: create worktree or clone ---
  - id: create_worktree
    condition: "${{ not done_check.output.orchestration_complete and inputs.isolation == 'worktree' and not has_isolation.output.exists }}"
    mcp:
      server: gobby-worktrees
      tool: create_worktree
      arguments:
        branch_name: "${{ 'epic-' + str(get_task_info.output.seq_num) if get_task_info.output.task_type == 'epic' else 'task-' + str(get_task_info.output.seq_num) }}"
        base_branch: "${{ current_branch }}"
        task_id: "${{ inputs.task_id }}"
        use_local: true

  - id: create_clone
    condition: "${{ not done_check.output.orchestration_complete and inputs.isolation == 'clone' and not has_isolation.output.exists }}"
    mcp:
      server: gobby-clones
      tool: create_clone
      arguments:
        branch_name: "${{ 'epic-' + str(get_task_info.output.seq_num) if get_task_info.output.task_type == 'epic' else 'task-' + str(get_task_info.output.seq_num) }}"
        clone_path: "${{ '~/.gobby/clones/epic-' + str(get_task_info.output.seq_num) }}"
        base_branch: "${{ current_branch }}"
        task_id: "${{ inputs.task_id }}"
        use_local: true

  # --- RESOLVE ISOLATION IDs ---
  - id: resolve_isolation_id
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          worktree_id: "${{ get_worktree.output.worktree.id if (get_worktree.output and get_worktree.output.worktree) else (create_worktree.output.worktree_id if create_worktree.output else '') }}"
          clone_id: "${{ get_clone.output.clone.id if (get_clone.output and get_clone.output.clone) else (create_clone.output.clone.id if create_clone.output else '') }}"

  # --- DISPATCH DEVS ---
  - id: count_active
    condition: "${{ not done_check.output.orchestration_complete }}"
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          active: "${{ len(scan_in_progress.output.tasks) }}"
          available_slots: "${{ inputs.max_concurrent - len(scan_in_progress.output.tasks) }}"

  - id: suggest_tasks
    condition: "${{ not done_check.output.orchestration_complete and count_active.output.available_slots > 0 and len(scan_open.output.tasks) > 0 }}"
    mcp:
      server: gobby-tasks
      tool: suggest_next_tasks
      arguments:
        parent_task_id: "${{ inputs.task_id }}"
        max_count: "${{ count_active.output.available_slots }}"

  - id: dispatch_devs
    condition: "${{ suggest_tasks.output and len(suggest_tasks.output.suggestions) > 0 }}"
    mcp:
      server: gobby-agents
      tool: dispatch_batch
      arguments:
        suggestions: "${{ suggest_tasks.output.suggestions }}"
        agent: "${{ inputs.developer_agent }}"
        clone_id: "${{ resolve_isolation_id.output.clone_id }}"
        worktree_id: "${{ resolve_isolation_id.output.worktree_id }}"
        provider: "${{ inputs.developer_provider }}"
        model: "${{ inputs.developer_model }}"
        timeout: "${{ inputs.agent_timeout }}"
        parent_session_id: "${{ session_id }}"

  # --- RESULT ---
  - id: tick_result
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          tick_complete: true
          orchestration_complete: "${{ done_check.output.orchestration_complete if done_check.output else false }}"
          is_standalone: "${{ standalone_check.output.is_standalone }}"
          open: "${{ len(scan_open.output.tasks) if scan_open.output else 0 }}"
          in_progress: "${{ len(scan_in_progress.output.tasks) if scan_in_progress.output else 0 }}"
          dispatched: "${{ dispatch_devs.output.dispatched if dispatch_devs.output else 0 }}"

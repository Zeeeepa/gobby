name: gobby-merge
type: pipeline
version: "1.0"
description: |
  Robust branch merge pipeline with AI conflict resolution, test validation,
  approval gates, and automatic rollback on failure.

  Operates on an existing worktree — does NOT create or manage worktrees.
  Attempts merge with AI conflict resolution, optionally runs tests,
  and pushes only after human approval. If anything fails, the worktree
  is left untouched for retry or debugging.

enabled: false
resume_on_restart: true

inputs:
  worktree_id:
    type: string
    required: true
    description: "Existing worktree ID to merge from"
  source_branch:
    type: string
    default: ""
    description: "Branch to merge FROM (empty = worktree's branch_name)"
  target_branch:
    type: string
    default: ""
    description: "Branch to merge INTO (empty = worktree's base_branch)"
  test_command:
    type: string
    default: ""
    description: "Shell command for test validation (empty = skip tests)"
  dry_run:
    type: boolean
    default: false
    description: "If true, merge and test but do not push"
  strategy:
    type: string
    default: "auto"
    description: "AI resolution strategy: auto, conflict_only, full_file, manual"

outputs:
  success: "${{ final_result.output.success }}"
  merge_method: "${{ final_result.output.merge_method }}"
  pushed: "${{ final_result.output.pushed }}"
  worktree_path: "${{ final_result.output.worktree_path }}"
  conflicts_resolved: "${{ final_result.output.conflicts_resolved }}"

steps:
  # ── PHASE 1: SETUP ──

  - id: fetch_origin
    exec: "git fetch origin"

  - id: get_worktree
    mcp:
      server: gobby-worktrees
      tool: get_worktree
      arguments:
        worktree_id: "${{ inputs.worktree_id }}"

  - id: validate_worktree
    condition: "${{ not get_worktree.output or not get_worktree.output.worktree }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "Worktree '${{ inputs.worktree_id }}' not found. The worktree must exist before running gobby-merge."

  - id: resolve_branches
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          source: "${{ inputs.source_branch or get_worktree.output.worktree.branch_name }}"
          target: "${{ inputs.target_branch or get_worktree.output.worktree.base_branch }}"
          worktree_path: "${{ get_worktree.output.worktree.worktree_path }}"

  # ── PHASE 2: MERGE ATTEMPT ──

  - id: try_merge
    mcp:
      server: gobby-worktrees
      tool: merge_worktree
      arguments:
        worktree_id: "${{ inputs.worktree_id }}"
        source_branch: "${{ resolve_branches.output.source }}"
        target_branch: "${{ resolve_branches.output.target }}"
        push: false

  - id: check_merge
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          clean: "${{ not try_merge.output.get('has_conflicts', false) }}"
          has_conflicts: "${{ try_merge.output.get('has_conflicts', false) }}"

  # ── PHASE 3: AI CONFLICT RESOLUTION (conditional) ──

  - id: ai_resolve
    condition: "${{ check_merge.output.has_conflicts }}"
    mcp:
      server: gobby-merge
      tool: merge_start
      arguments:
        worktree_id: "${{ inputs.worktree_id }}"
        source_branch: "${{ resolve_branches.output.source }}"
        target_branch: "${{ resolve_branches.output.target }}"
        strategy: "${{ inputs.strategy }}"

  - id: check_resolution
    condition: "${{ check_merge.output.has_conflicts }}"
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          ai_resolved: "${{ not ai_resolve.output.get('needs_human_review', true) if ai_resolve.output else false }}"
          needs_human: "${{ ai_resolve.output.get('needs_human_review', false) if ai_resolve.output else false }}"
          resolution_id: "${{ ai_resolve.output.get('resolution_id', '') if ai_resolve.output else '' }}"

  # Human review gate — only if AI couldn't fully resolve
  - id: human_review
    condition: "${{ check_merge.output.has_conflicts and check_resolution.output.needs_human }}"
    mcp:
      server: gobby-merge
      tool: merge_status
      arguments:
        resolution_id: "${{ check_resolution.output.resolution_id }}"
    approval:
      required: true
      message: |
        AI conflict resolution could not fully resolve all conflicts.
        Review the remaining conflicts and approve to continue, or reject to abort.
        Resolution ID: ${{ check_resolution.output.resolution_id }}
      timeout_seconds: 86400

  # Apply the resolution (AI-resolved or human-approved)
  - id: apply_resolution
    condition: "${{ check_merge.output.has_conflicts and (check_resolution.output.ai_resolved or human_review.output) }}"
    mcp:
      server: gobby-merge
      tool: merge_apply
      arguments:
        resolution_id: "${{ check_resolution.output.resolution_id }}"

  # Abort if resolution failed entirely
  - id: abort_failed
    condition: "${{ check_merge.output.has_conflicts and not check_resolution.output.ai_resolved and not human_review.output }}"
    mcp:
      server: gobby-merge
      tool: merge_abort
      arguments:
        resolution_id: "${{ check_resolution.output.resolution_id }}"

  - id: fail_unresolved
    condition: "${{ abort_failed.output }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "Merge failed: conflicts could not be resolved by AI or human review"

  # ── PHASE 4: TEST VALIDATION (conditional) ──

  - id: run_tests
    condition: "${{ inputs.test_command and (check_merge.output.clean or (apply_resolution.output)) }}"
    exec: "cd ${{ resolve_branches.output.worktree_path }} && ${{ inputs.test_command }}"

  # ── PHASE 5: PUSH (with approval gate) ──

  - id: push_gate
    condition: "${{ not inputs.dry_run and (check_merge.output.clean or (apply_resolution.output)) }}"
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          ready: true
    approval:
      required: true
      message: |
        Merge of ${{ resolve_branches.output.source }} -> ${{ resolve_branches.output.target }} is ready to push.
        Tests: ${{ 'passed' if inputs.test_command else 'skipped (no test_command)' }}
        Conflicts: ${{ 'resolved by AI' if check_merge.output.has_conflicts else 'none' }}
        Approve to push to origin.
      timeout_seconds: 86400

  - id: push_merge
    condition: "${{ not inputs.dry_run and push_gate.output }}"
    mcp:
      server: gobby-worktrees
      tool: merge_worktree
      arguments:
        worktree_id: "${{ inputs.worktree_id }}"
        source_branch: "${{ resolve_branches.output.source }}"
        target_branch: "${{ resolve_branches.output.target }}"
        push: true

  # ── RESULT ──

  - id: final_result
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          success: true
          merge_method: "${{ 'clean' if check_merge.output.clean else 'ai_resolved' }}"
          pushed: "${{ bool(push_merge.output and push_merge.output.get('pushed', false)) if not inputs.dry_run else false }}"
          dry_run: "${{ inputs.dry_run }}"
          worktree_path: "${{ resolve_branches.output.worktree_path }}"
          conflicts_resolved: "${{ len(ai_resolve.output.get('resolved_files', [])) if ai_resolve.output else 0 }}"

name: merge-worktree
type: pipeline
version: "1.0"
description: |
  Thin dispatch pipeline: spawns a merge agent for a worktree merge.
  Usable standalone or invoked from coordinator/orchestrator.

enabled: false

inputs:
  worktree_id:
    type: string
    required: true
    description: "Worktree ID containing the work to merge"
  target_branch:
    type: string
    default: "main"
    description: "Target branch to merge into"
  provider:
    type: string
    default: "claude"
    description: "LLM provider"
  model:
    type: string
    default: ""
    description: "Model override (empty = provider default)"

steps:
  - id: spawn_merge
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Merge worktree ${{ inputs.worktree_id }} into ${{ inputs.target_branch }}. Call merge_worktree with push=true and target_branch=${{ inputs.target_branch }}."
        agent: merge
        worktree_id: "${{ inputs.worktree_id }}"
        provider: "${{ inputs.provider }}"
        model: "${{ inputs.model }}"
        mode: terminal

outputs:
  run_id: "${{ spawn_merge.output.run_id }}"

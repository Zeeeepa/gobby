name: merge-clone
type: pipeline
version: "1.0"
description: |
  Thin dispatch pipeline: spawns a merge agent for a clone merge.
  Usable standalone or invoked from coordinator/orchestrator.

enabled: true

inputs:
  clone_id:
    type: string
    required: true
    description: "Clone ID containing the work to merge"
  target_branch:
    type: string
    default: "main"
    description: "Target branch to merge into"
  provider:
    type: string
    default: "claude"
    description: "LLM provider"
  model:
    type: string
    default: ""
    description: "Model override (empty = provider default)"

steps:
  - id: spawn_merge
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Merge clone ${{ inputs.clone_id }} into ${{ inputs.target_branch }}. Call merge_clone with target_branch=${{ inputs.target_branch }}."
        agent: merge
        clone_id: "${{ inputs.clone_id }}"
        provider: "${{ inputs.provider }}"
        model: "${{ inputs.model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

outputs:
  run_id: "${{ steps.spawn_merge.output.run_id }}"

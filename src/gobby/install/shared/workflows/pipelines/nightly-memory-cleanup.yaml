name: nightly-memory-cleanup
type: pipeline
version: "1.0"
description: |
  Nightly memory cleanup pipeline. Audits gobby-memory for stale, duplicate,
  code-derivable, and orphaned entries, then removes them. Designed to run on
  a nightly cron schedule (e.g., "0 3 * * *").

enabled: false

inputs:
  dry_run:
    type: boolean
    default: false
    description: "When true, audit only without deleting"
  max_stale_age_days:
    type: integer
    default: 90
    description: "Memories older than this with 0 access_count are considered stale"

steps:
  # --- RE-ENTRANCY GUARD ---
  - id: reentry_check
    mcp:
      server: gobby-workflows
      tool: list_pipeline_executions
      arguments:
        pipeline_name: "nightly-memory-cleanup"
        status: "running"

  - id: reentry_gate
    condition: "${{ len(reentry_check.output.executions) > 1 }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "Skipped: another nightly-memory-cleanup execution is already running"

  # --- AUDIT PHASE ---
  - id: audit
    mcp:
      server: gobby-memory
      tool: audit_memories
      arguments:
        max_stale_age_days: "${{ inputs.max_stale_age_days }}"

  # --- SKIP IF NOTHING TO CLEAN ---
  - id: nothing_to_clean
    condition: "${{ steps.audit.output.total_found == 0 }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "No memories to clean up - all clean"

  # --- CLEANUP PHASE ---
  - id: cleanup
    mcp:
      server: gobby-memory
      tool: cleanup_memories
      arguments:
        dry_run: "${{ inputs.dry_run }}"
        max_stale_age_days: "${{ inputs.max_stale_age_days }}"

name: spawn-developer
type: pipeline
description: |
  Thin dispatch pipeline: spawns a developer agent for a given task.
  The conductor can invoke this via run_pipeline for tracked dispatch,
  or call spawn_agent directly for untracked dispatch.

version: "1.0"
enabled: false

inputs:
  task_id:
    type: string
    required: true
    description: "Task ID to assign to the developer agent"
  provider:
    type: string
    default: "claude"
    description: "LLM provider (claude, gemini, etc.)"
  model:
    type: string
    default: ""
    description: "Model override (empty = provider default)"
  worktree_id:
    type: string
    default: ""
    description: "Worktree ID for isolation (empty = auto-create)"

steps:
  - id: spawn
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Work on task ${{ inputs.task_id }}. Claim it, implement, test, commit, and submit for review."
        agent_definition: developer
        provider: "${{ inputs.provider }}"
        model: "${{ inputs.model }}"
        worktree_id: "${{ inputs.worktree_id }}"
        session_variables:
          assigned_task_id: "${{ inputs.task_id }}"

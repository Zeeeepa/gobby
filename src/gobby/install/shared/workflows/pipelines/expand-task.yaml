name: expand-task
type: pipeline
version: "1.0"
description: |
  Deterministic expansion sub-pipeline. Hard boundary between research (creative)
  and task creation (mechanical).

  Flow: spawn researcher → wait → validate spec → execute expansion →
        spawn QA → wait QA → check QA → wire affected files → analyze dependencies

  Reusable: orchestrator invokes it, /gobby expand wraps it, other pipelines
  compose with it.

inputs:
  task_id:
    type: string
    required: true
    description: "Task ID to expand"
  session_id:
    type: string
    required: true
    description: "Session ID for tracking"
  plan_file:
    type: string
    required: false
    description: "Relative path to plan file for subtask context injection"
  agent: "expander"
  provider: "claude"
  model: null
  wait_timeout: 600

outputs:
  created: "${{ steps.execute.output.created }}"
  count: "${{ steps.execute.output.count }}"
  validation: "${{ steps.validate.output }}"
  qa_result: "${{ steps.check_qa.output }}"

steps:
  # --- 1. Spawn the researcher agent ---
  - id: spawn_researcher
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Research and produce an expansion spec for task ${{ inputs.task_id }}. Plan file: ${{ inputs.plan_file or 'none' }}"
        agent: "${{ inputs.agent }}"
        task_id: "${{ inputs.task_id }}"
        provider: "${{ inputs.provider }}"
        model: "${{ inputs.model }}"
        parent_session_id: "${{ inputs.session_id }}"
        mode: terminal

  # --- 2. Wait for researcher to complete ---
  - id: wait_researcher
    wait:
      completion_id: "${{ steps.spawn_researcher.output.run_id }}"
      timeout: "${{ inputs.wait_timeout }}"

  # --- 3. Validate the saved spec ---
  - id: validate
    mcp:
      server: gobby-tasks
      tool: validate_expansion_spec
      arguments:
        task_id: "${{ inputs.task_id }}"

  # --- 4. Gate: fail if spec is invalid ---
  - id: check_valid
    condition: "${{ not steps.validate.output.valid }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "Expansion spec validation failed: ${{ steps.validate.output.errors }}"

  # --- 5. Execute the expansion atomically ---
  - id: execute
    mcp:
      server: gobby-tasks
      tool: execute_expansion
      arguments:
        parent_task_id: "${{ inputs.task_id }}"
        session_id: "${{ inputs.session_id or session_id }}"

  # --- 6. Spawn the QA agent to validate expansion ---
  - id: spawn_qa
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Validate expansion of task ${{ inputs.task_id }}. Plan file: ${{ inputs.plan_file or 'none' }}. Created tasks: ${{ steps.execute.output.created }}"
        agent: "expansion-qa"
        task_id: "${{ inputs.task_id }}"
        provider: "${{ inputs.provider }}"
        model: "${{ inputs.model }}"
        parent_session_id: "${{ inputs.session_id }}"
        mode: terminal

  # --- 7. Wait for QA agent to complete ---
  - id: wait_qa
    wait:
      completion_id: "${{ steps.spawn_qa.output.run_id }}"
      timeout: "${{ inputs.wait_timeout }}"

  # --- 8. Check QA result ---
  - id: check_qa
    mcp:
      server: gobby-tasks
      tool: check_expansion_qa_result
      arguments:
        task_id: "${{ inputs.task_id }}"

  # --- 9. Wire affected files from spec to child tasks ---
  - id: wire_files
    mcp:
      server: gobby-tasks
      tool: wire_affected_files_from_spec
      arguments:
        parent_task_id: "${{ inputs.task_id }}"

  # --- 10. Analyze dependencies for file overlaps ---
  - id: analyze_deps
    condition: "${{ steps.execute.output.count > 1 }}"
    mcp:
      server: gobby-tasks
      tool: find_file_overlaps
      arguments:
        task_ids: "${{ steps.execute.output.created }}"

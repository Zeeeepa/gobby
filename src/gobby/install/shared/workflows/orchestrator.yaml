name: orchestrator
type: pipeline
version: "2.0"
description: |
  Async, parallel, dependency-aware orchestration pipeline.
  Replaces coordinator with fire-and-forget agent dispatch,
  merge-to-unblock for dependency resolution, and step workflow
  enforcement on all spawned agents.

inputs:
  session_task: null
  developer_agent: "developer"
  qa_agent: "qa-reviewer"
  merge_agent: "merge"
  developer_provider: "claude"
  qa_provider: "claude"
  merge_provider: "claude"
  developer_model: null
  qa_model: null
  merge_model: null
  merge_target: null
  wait_timeout: 600
  max_concurrent: 5
  poll_interval: 15
  max_iterations: 200
  _current_iteration: 0

steps:
  # --- Guard ---
  - id: check_limit
    condition: "${{ inputs._current_iteration >= inputs.max_iterations }}"
    exec: "echo 'ERROR: max iterations reached ({{ inputs._current_iteration }}/{{ inputs.max_iterations }})' && exit 1"

  - id: fetch_origin
    exec: "git fetch origin"

  # --- Scan task states ---
  - id: scan_open
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "open"

  - id: scan_in_progress
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "in_progress"

  - id: scan_needs_review
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "needs_review"

  - id: scan_approved
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "review_approved"

  # --- Check completion ---
  - id: all_closed
    condition: "${{ (scan_open.output.tasks | length == 0) and (scan_in_progress.output.tasks | length == 0) and (scan_needs_review.output.tasks | length == 0) and (scan_approved.output.tasks | length == 0) }}"
    exec: "echo 'Orchestration complete. All tasks closed.'"

  # --- Find next dispatchable task ---
  - id: find_next
    condition: "${{ not ((scan_open.output.tasks | length == 0) and (scan_in_progress.output.tasks | length == 0) and (scan_needs_review.output.tasks | length == 0) and (scan_approved.output.tasks | length == 0)) }}"
    mcp:
      server: gobby-tasks
      tool: suggest_next_task
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"

  # --- MERGE PHASE (blocking — wait for merge agent) ---
  # Merge when: approved tasks exist AND (no next task available OR final merge)
  - id: spawn_merge
    condition: "${{ (scan_approved.output.tasks | length > 0) and ((not find_next.output.suggestion) or ((scan_open.output.tasks | length == 0) and (scan_in_progress.output.tasks | length == 0) and (scan_needs_review.output.tasks | length == 0))) }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Merge all review_approved tasks under ${{ inputs.session_task }} into ${{ inputs.merge_target }}"
        agent: "${{ inputs.merge_agent }}"
        provider: "${{ inputs.merge_provider }}"
        model: "${{ inputs.merge_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  - id: wait_merge
    condition: "${{ spawn_merge.output.run_id if spawn_merge.output else '' }}"
    mcp:
      server: gobby-agents
      tool: wait_for_agent
      arguments:
        run_id: "${{ spawn_merge.output.run_id }}"
        timeout: "${{ inputs.wait_timeout }}"
        kill_on_timeout: true

  - id: fetch_after_merge
    condition: "${{ wait_merge.output.completed if wait_merge.output else '' }}"
    exec: "bash -c 'git stash -q 2>/dev/null || true; git pull --rebase origin ${{ inputs.merge_target }}; rc=$?; git stash pop -q 2>/dev/null || true; exit $rc'"

  # --- DISPATCH DEVELOPER (fire-and-forget) ---
  - id: create_worktree
    condition: "${{ find_next.output.suggestion.ref if find_next.output and find_next.output.suggestion else '' }}"
    mcp:
      server: gobby-worktrees
      tool: create_worktree
      arguments:
        branch_name: "task-${{ find_next.output.suggestion.seq_num }}"
        base_branch: "${{ inputs.merge_target }}"
        task_id: "${{ find_next.output.suggestion.id }}"

  - id: spawn_developer
    condition: "${{ create_worktree.output.worktree_id if create_worktree.output else '' }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Implement task ${{ find_next.output.suggestion.ref }}: ${{ find_next.output.suggestion.title }}"
        agent: "${{ inputs.developer_agent }}"
        task_id: "${{ find_next.output.suggestion.id }}"
        worktree_id: "${{ create_worktree.output.worktree_id }}"
        provider: "${{ inputs.developer_provider }}"
        model: "${{ inputs.developer_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  # --- DISPATCH QA (fire-and-forget) ---
  - id: spawn_qa
    condition: "${{ scan_needs_review.output.tasks[0].id if scan_needs_review.output and scan_needs_review.output.tasks else '' }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Review and QA task ${{ scan_needs_review.output.tasks[0].ref }}"
        agent: "${{ inputs.qa_agent }}"
        task_id: "${{ scan_needs_review.output.tasks[0].id }}"
        provider: "${{ inputs.qa_provider }}"
        model: "${{ inputs.qa_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  # --- LOOP ---
  - id: poll_wait
    condition: "${{ not ((scan_open.output.tasks | length == 0) and (scan_in_progress.output.tasks | length == 0) and (scan_needs_review.output.tasks | length == 0) and (scan_approved.output.tasks | length == 0)) }}"
    exec: "sleep ${{ inputs.poll_interval }}"

  - id: next_iteration
    condition: "${{ not ((scan_open.output.tasks | length == 0) and (scan_in_progress.output.tasks | length == 0) and (scan_needs_review.output.tasks | length == 0) and (scan_approved.output.tasks | length == 0)) }}"
    invoke_pipeline:
      name: orchestrator
      arguments:
        _current_iteration: "${{ inputs._current_iteration + 1 }}"
        session_task: "${{ inputs.session_task }}"
        merge_target: "${{ inputs.merge_target }}"
        developer_agent: "${{ inputs.developer_agent }}"
        qa_agent: "${{ inputs.qa_agent }}"
        merge_agent: "${{ inputs.merge_agent }}"
        developer_provider: "${{ inputs.developer_provider }}"
        qa_provider: "${{ inputs.qa_provider }}"
        merge_provider: "${{ inputs.merge_provider }}"
        developer_model: "${{ inputs.developer_model }}"
        qa_model: "${{ inputs.qa_model }}"
        merge_model: "${{ inputs.merge_model }}"
        wait_timeout: "${{ inputs.wait_timeout }}"
        max_concurrent: "${{ inputs.max_concurrent }}"
        poll_interval: "${{ inputs.poll_interval }}"
        max_iterations: "${{ inputs.max_iterations }}"

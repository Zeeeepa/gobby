name: orchestrator
type: pipeline
version: "2.0"
description: |
  Async, dependency-aware orchestration pipeline with single worktree per epic.
  Creates one worktree on first dispatch, reuses it for all subsequent tasks.
  Sequential dispatch ensures only one developer runs at a time.
  Merge happens once at epic completion.

inputs:
  session_task: null
  developer_agent: "developer"
  qa_agent: "qa-reviewer"
  merge_agent: "merge"
  developer_provider: "claude"
  qa_provider: "claude"
  merge_provider: "claude"
  developer_model: null
  qa_model: null
  merge_model: null
  merge_target: null
  wait_timeout: 600
  max_concurrent: 5
  poll_interval: 15
  max_iterations: 200
  _current_iteration: 0
  _worktree_id: null

steps:
  # --- Guard ---
  - id: check_limit
    condition: "${{ inputs._current_iteration >= inputs.max_iterations }}"
    exec: "echo 'ERROR: max iterations reached ({{ inputs._current_iteration }}/{{ inputs.max_iterations }})' && exit 1"

  - id: fetch_origin
    exec: "git fetch origin"

  # --- Get epic info (first iteration only, for branch naming) ---
  - id: get_epic
    condition: "${{ not inputs._worktree_id }}"
    mcp:
      server: gobby-tasks
      tool: get_task
      arguments:
        task_id: "${{ inputs.session_task }}"

  # --- Expand epic if not yet expanded (first iteration only) ---
  - id: expand_epic
    condition: "${{ (not inputs._worktree_id) and (get_epic.output.result.is_expanded == false) }}"
    invoke_pipeline:
      name: expand-task
      arguments:
        task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"

  # --- Scan task states ---
  - id: scan_open
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "open"

  - id: scan_in_progress
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "in_progress"

  - id: scan_needs_review
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "needs_review"

  - id: scan_approved
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "review_approved"

  # --- Check completion ---
  - id: all_closed
    exec: >
      DONE=${{ ((scan_open.output.tasks | length == 0) and (scan_in_progress.output.tasks | length == 0) and (scan_needs_review.output.tasks | length == 0) and (scan_approved.output.tasks | length == 0)) | lower }};
      if [ "$DONE" = "true" ]; then echo "Orchestration complete. All tasks closed." >&2; fi;
      echo "{\"done\": $DONE}"

  # --- Find next dispatchable task (sequential: only when no in-progress tasks) ---
  - id: find_next
    condition: "${{ (not all_closed.output.done) and (scan_in_progress.output.tasks | length == 0) }}"
    mcp:
      server: gobby-tasks
      tool: suggest_next_task
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"

  # --- MERGE PHASE (blocking — one merge at epic completion) ---
  # Merge when: only approved tasks remain (no open, in_progress, or needs_review)
  - id: spawn_merge
    condition: "${{ (scan_approved.output.tasks | length > 0) and (scan_open.output.tasks | length == 0) and (scan_in_progress.output.tasks | length == 0) and (scan_needs_review.output.tasks | length == 0) }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Merge all review_approved tasks under ${{ inputs.session_task }} into ${{ inputs.merge_target }}"
        agent: "${{ inputs.merge_agent }}"
        provider: "${{ inputs.merge_provider }}"
        model: "${{ inputs.merge_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  - id: wait_merge
    condition: "${{ spawn_merge.output.run_id if spawn_merge.output else '' }}"
    wait:
      completion_id: "${{ spawn_merge.output.run_id }}"
      timeout: "${{ inputs.wait_timeout }}"

  - id: fetch_after_merge
    condition: "${{ wait_merge.output.completed if wait_merge.output else '' }}"
    exec: 'bash -c ''git stash -q 2>/dev/null || true; git pull --rebase origin ${{ inputs.merge_target }}; rc=$?; if [ $rc -ne 0 ]; then if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then echo "Rebase conflict detected! Resolve conflicts and run `git rebase --continue`, or run `git rebase --abort` to cancel."; fi; exit $rc; fi; git stash pop -q 2>/dev/null || true; exit 0'''

  # --- CREATE EPIC WORKTREE (first iteration only) ---
  - id: create_worktree
    condition: "${{ (not inputs._worktree_id) and (find_next.output.suggestion.ref if find_next.output and find_next.output.suggestion else '') }}"
    mcp:
      server: gobby-worktrees
      tool: create_worktree
      arguments:
        branch_name: "epic-${{ get_epic.output.result.seq_num }}"
        base_branch: "${{ inputs.merge_target }}"
        task_id: "${{ inputs.session_task }}"
        use_local: true
        provider: "${{ inputs.developer_provider }}"

  # --- DISPATCH DEVELOPER (fire-and-forget, sequential) ---
  - id: spawn_developer
    condition: "${{ find_next.output.suggestion.ref if find_next.output and find_next.output.suggestion else '' }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Implement task ${{ find_next.output.suggestion.ref }}: ${{ find_next.output.suggestion.title }}"
        agent: "${{ inputs.developer_agent }}"
        task_id: "${{ find_next.output.suggestion.id }}"
        worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
        provider: "${{ inputs.developer_provider }}"
        model: "${{ inputs.developer_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  # --- DISPATCH QA (fire-and-forget, with worktree context) ---
  - id: spawn_qa
    condition: "${{ scan_needs_review.output.tasks[0].id if scan_needs_review.output and scan_needs_review.output.tasks else '' }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Review and QA task ${{ scan_needs_review.output.tasks[0].ref }}"
        agent: "${{ inputs.qa_agent }}"
        task_id: "${{ scan_needs_review.output.tasks[0].id }}"
        worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
        provider: "${{ inputs.qa_provider }}"
        model: "${{ inputs.qa_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  # --- LOOP ---
  - id: poll_wait
    condition: "${{ not all_closed.output.done }}"
    exec: "sleep ${{ inputs.poll_interval }}"

  - id: next_iteration
    condition: "${{ not all_closed.output.done }}"
    invoke_pipeline:
      name: orchestrator
      arguments:
        _current_iteration: "${{ inputs._current_iteration + 1 }}"
        _worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
        session_task: "${{ inputs.session_task }}"
        merge_target: "${{ inputs.merge_target }}"
        developer_agent: "${{ inputs.developer_agent }}"
        qa_agent: "${{ inputs.qa_agent }}"
        merge_agent: "${{ inputs.merge_agent }}"
        developer_provider: "${{ inputs.developer_provider }}"
        qa_provider: "${{ inputs.qa_provider }}"
        merge_provider: "${{ inputs.merge_provider }}"
        developer_model: "${{ inputs.developer_model }}"
        qa_model: "${{ inputs.qa_model }}"
        merge_model: "${{ inputs.merge_model }}"
        wait_timeout: "${{ inputs.wait_timeout }}"
        poll_interval: "${{ inputs.poll_interval }}"
        max_iterations: "${{ inputs.max_iterations }}"

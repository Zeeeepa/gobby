name: orchestrator
type: pipeline
version: "3.0"
description: |
  Event-driven, dependency-aware orchestration pipeline with parallel dispatch.
  Single-pass scan-and-dispatch: scan state → dispatch agents → register
  continuations → exit. Each agent completion triggers a fresh pass via
  completion callbacks. No loops, no sleeps, no blocking waits.

  Supports both epics (tasks with children) and standalone tasks (single task
  through dev → QA → merge cycle).

outputs:
  iteration: "${{ result.output.iteration }}"
  orchestration_complete: "${{ result.output.orchestration_complete }}"
  session_task: "${{ result.output.session_task }}"
  is_standalone: "${{ result.output.is_standalone }}"

inputs:
  session_task: null
  developer_agent: "developer"
  qa_agent: "qa-reviewer"
  merge_agent: "merge"
  developer_provider: "claude"
  qa_provider: "claude"
  merge_provider: "claude"
  developer_model: null
  qa_model: null
  merge_model: null
  merge_target: null
  wait_timeout: 600
  max_concurrent: 5
  max_iterations: 200
  _current_iteration: 0
  _worktree_id: null

steps:
  # --- Guard ---
  - id: check_limit
    condition: "${{ inputs._current_iteration >= inputs.max_iterations }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "Max iterations reached (${{ inputs._current_iteration }}/${{ inputs.max_iterations }})"

  - id: fetch_origin
    exec: "git fetch origin"

  # --- Get task info (first iteration only, for branch naming) ---
  - id: get_epic
    condition: "${{ not inputs._worktree_id }}"
    mcp:
      server: gobby-tasks
      tool: get_task
      arguments:
        task_id: "${{ inputs.session_task }}"

  # --- Expand epic if not yet expanded (first iteration only, epics only) ---
  - id: expand_epic
    condition: "${{ (not inputs._worktree_id) and (get_epic.output.is_expanded == false) and (get_epic.output.task_type == 'epic') }}"
    invoke_pipeline:
      name: expand-task
      arguments:
        task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"

  # --- Scan child task states ---
  - id: scan_open
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "open"

  - id: scan_in_progress
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "in_progress"

  - id: scan_needs_review
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "needs_review"

  - id: scan_approved
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "review_approved"

  # --- Detect standalone vs epic ---
  - id: check_standalone
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          is_standalone: "${{ len(scan_open.output.tasks) + len(scan_in_progress.output.tasks) + len(scan_needs_review.output.tasks) + len(scan_approved.output.tasks) == 0 }}"

  # For standalone, get the task's own status
  - id: get_task_status
    condition: "${{ check_standalone.output.is_standalone }}"
    mcp:
      server: gobby-tasks
      tool: get_task
      arguments:
        task_id: "${{ inputs.session_task }}"

  # --- Check completion ---
  - id: all_closed
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          done: >-
            ${{
              (check_standalone.output.is_standalone and get_task_status.output.status == 'closed')
              or
              (not check_standalone.output.is_standalone
               and len(scan_open.output.tasks) == 0
               and len(scan_in_progress.output.tasks) == 0
               and len(scan_needs_review.output.tasks) == 0
               and len(scan_approved.output.tasks) == 0)
            }}

  # --- Find next dispatchable tasks (parallel: dispatch when below capacity) ---
  - id: find_next
    condition: "${{ (not all_closed.output.done) and (len(scan_in_progress.output.tasks) < inputs.max_concurrent) and (not check_standalone.output.is_standalone or get_task_status.output.status == 'open') }}"
    mcp:
      server: gobby-tasks
      tool: suggest_next_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"
        max_count: "${{ inputs.max_concurrent - len(scan_in_progress.output.tasks) }}"

  # --- MERGE PHASE (fire-and-forget) ---
  # Epic merge: only approved children remain (no open, in_progress, or needs_review)
  # Standalone merge: task itself is review_approved
  - id: spawn_merge
    condition: >-
      ${{
        (not check_standalone.output.is_standalone
         and len(scan_approved.output.tasks) > 0
         and len(scan_open.output.tasks) == 0
         and len(scan_in_progress.output.tasks) == 0
         and len(scan_needs_review.output.tasks) == 0)
        or
        (check_standalone.output.is_standalone
         and get_task_status.output.status == 'review_approved')
      }}
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Merge all review_approved tasks under ${{ inputs.session_task }} into ${{ inputs.merge_target }}"
        agent: "${{ inputs.merge_agent }}"
        provider: "${{ inputs.merge_provider }}"
        model: "${{ inputs.merge_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  # --- CREATE WORKTREE (first iteration only) ---
  - id: create_worktree
    condition: "${{ (not inputs._worktree_id) and (find_next.output.suggestions[0].ref if find_next.output and find_next.output.suggestions else '') }}"
    mcp:
      server: gobby-worktrees
      tool: create_worktree
      arguments:
        branch_name: "${{ 'task-' + str(get_epic.output.seq_num) if get_epic.output.task_type != 'epic' else 'epic-' + str(get_epic.output.seq_num) }}"
        base_branch: "${{ inputs.merge_target }}"
        task_id: "${{ inputs.session_task }}"
        use_local: true
        provider: "${{ inputs.developer_provider }}"

  # --- DISPATCH DEVELOPERS (fire-and-forget, parallel batch) ---
  - id: spawn_developers
    condition: "${{ len(find_next.output.suggestions) > 0 if find_next.output else false }}"
    mcp:
      server: gobby-agents
      tool: dispatch_batch
      arguments:
        suggestions: "${{ find_next.output.suggestions }}"
        agent: "${{ inputs.developer_agent }}"
        worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
        provider: "${{ inputs.developer_provider }}"
        model: "${{ inputs.developer_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  # --- ANNOTATE OBSERVED FILES (post-hoc, one per iteration) ---
  - id: annotate_observed
    condition: "${{ len(scan_needs_review.output.tasks) > 0 }}"
    mcp:
      server: gobby-tasks
      tool: update_observed_files
      arguments:
        task_id: "${{ scan_needs_review.output.tasks[0].id }}"

  # --- DISPATCH QA (fire-and-forget, with worktree context) ---
  # Epic: first needs_review child task. Standalone: task itself is needs_review.
  - id: spawn_qa
    condition: >-
      ${{
        (scan_needs_review.output.tasks[0].id if scan_needs_review.output and scan_needs_review.output.tasks else '')
        or
        (check_standalone.output.is_standalone and get_task_status.output.status == 'needs_review')
      }}
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "${{ 'Review and QA task ' + (scan_needs_review.output.tasks[0].ref if scan_needs_review.output and scan_needs_review.output.tasks else get_task_status.output.ref) }}"
        agent: "${{ inputs.qa_agent }}"
        task_id: "${{ scan_needs_review.output.tasks[0].id if scan_needs_review.output and scan_needs_review.output.tasks else get_task_status.output.id }}"
        worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
        provider: "${{ inputs.qa_provider }}"
        model: "${{ inputs.qa_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  # --- REGISTER CONTINUATIONS (event-driven re-invocation) ---
  - id: register_continuations
    condition: "${{ not all_closed.output.done }}"
    mcp:
      server: gobby-workflows
      tool: register_pipeline_continuation
      arguments:
        dispatch_outputs:
          developers: "${{ spawn_developers.output if spawn_developers.output else None }}"
          qa: "${{ spawn_qa.output if spawn_qa.output else None }}"
          merge: "${{ spawn_merge.output if spawn_merge.output else None }}"
        pipeline_name: "orchestrator"
        session_id: "${{ session_id }}"
        inputs:
          _current_iteration: "${{ inputs._current_iteration + 1 }}"
          _worktree_id: "${{ inputs._worktree_id or (create_worktree.output.worktree_id if create_worktree.output else '') }}"
          session_task: "${{ inputs.session_task }}"
          merge_target: "${{ inputs.merge_target }}"
          developer_agent: "${{ inputs.developer_agent }}"
          qa_agent: "${{ inputs.qa_agent }}"
          merge_agent: "${{ inputs.merge_agent }}"
          developer_provider: "${{ inputs.developer_provider }}"
          qa_provider: "${{ inputs.qa_provider }}"
          merge_provider: "${{ inputs.merge_provider }}"
          developer_model: "${{ inputs.developer_model }}"
          qa_model: "${{ inputs.qa_model }}"
          merge_model: "${{ inputs.merge_model }}"
          wait_timeout: "${{ inputs.wait_timeout }}"
          max_iterations: "${{ inputs.max_iterations }}"

  # --- RESULT ---
  - id: result
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          iteration: "${{ inputs._current_iteration }}"
          orchestration_complete: "${{ all_closed.output.done }}"
          session_task: "${{ inputs.session_task }}"
          is_standalone: "${{ check_standalone.output.is_standalone }}"

name: merge
description: |
  Merge agent: merges the shared epic worktree into the target branch,
  then closes all approved tasks.

version: "3.0"
enabled: false
isolation: none

instructions: |
  You are a merge agent spawned by an orchestrator pipeline.
  You work in the main repo and operate on a SHARED worktree via MCP tools.

  Your prompt contains the worktree_id and merge_target. Use them directly.

  Steps:
  1. merge_worktree(worktree_id=<worktree_id>) to merge the epic branch into the target
  2. If conflicts: use gobby-merge tools to resolve. If unresolvable, escalate_task on the parent epic.
  3. Run the push_command from the merge_worktree result
  4. list_tasks(parent_task_id=<epic>, status="review_approved") to find approved tasks
  5. For each approved task (in seq_num order):
     a. auto_link_commits(task_id=..., since="1 hour ago")
     b. close_task(task_id=..., changes_summary="Merged to {target}")
  6. delete_worktree(worktree_id=<worktree_id>, force=true)
  7. call kill_agent to terminate

  CRITICAL RULES:
  - Do NOT use raw git merge commands. Use ONLY merge_worktree MCP tool. Exception: you are allowed to run 'git fetch origin'.
  - Do NOT edit or write files — you only merge.
  - Do NOT stop or exit without calling kill_agent.
  - Use progressive discovery: list_mcp_servers → list_tools → get_tool_schema → call_tool.
  - There is ONE shared worktree for the entire epic, NOT one per task.

workflows:
  rule_selectors:
    include:
      - "tag:default"
      - "tag:worker-safety"
    exclude:
      - "tag:sync"

step_variables:
  merge_complete: false

steps:
  - name: merge
    description: "Merge shared worktree and close approved tasks"
    status_message: |
      1. merge_worktree(worktree_id=...) to merge the epic branch
      2. Run the push_command from the result
      3. list_tasks(parent_task_id=..., status="review_approved")
      4. For each: auto_link_commits, close_task
      5. delete_worktree(worktree_id=..., force=true)
      6. call kill_agent to terminate
    allowed_tools:
      - Bash
      - Read
      - Glob
      - Grep
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    blocked_tools:
      - Write
      - Edit
    allowed_mcp_tools:
      - "gobby-worktrees:list_worktrees"
      - "gobby-worktrees:merge_worktree"
      - "gobby-worktrees:delete_worktree"
      - "gobby-tasks:list_tasks"
      - "gobby-tasks:close_task"
      - "gobby-tasks:auto_link_commits"
      - "gobby-tasks:escalate_task"
      - "gobby-merge:*"
      - "gobby-agents:kill_agent"
    transitions:
      - to: terminate
        when: "vars.merge_complete"

  - name: terminate
    description: "Self-terminate"
    status_message: "All merges complete. Call kill_agent to terminate."
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-agents:kill_agent"

exit_condition: "current_step == 'terminate'"

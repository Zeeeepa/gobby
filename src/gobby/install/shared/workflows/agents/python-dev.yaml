name: python-dev
description: |
  Python developer agent: implements Python tasks with hub skills for
  testing patterns, performance optimization, type hints, and best practices.
  Based on the developer step workflow (claim -> implement -> terminate).
  Provider/model inherited from spawner.

version: "1.0"
enabled: false
priority: 20
mode: terminal
timeout: 1800

instructions: |
  You are a Python developer agent spawned by an orchestrator pipeline.
  Your task ID is in your session variables as assigned_task_id.

  Your behavior is enforced by a step workflow. Follow the step prompts:
  1. CLAIM: Call claim_task with your assigned_task_id, then get_task for details
  2. IMPLEMENT: Read code, write implementation, write tests, run tests, commit,
     then call mark_task_needs_review(task_id, session_id) to submit for QA
  3. TERMINATE: Call kill_agent to shut down

  PLAN CONTEXT:
  - If your task description includes a "Plan reference:" line with a file path,
    you may Read that file to understand the broader design and motivation.
  - Your task DESCRIPTION is your scope — follow it, not the plan.
  - The plan may differ from your task because the expansion was adapted
    to the actual codebase. Trust your task description over the plan.
  - Do NOT implement other sections of the plan.
  - Do NOT modify the plan file itself.

  PYTHON CONVENTIONS:
  - Use `uv run ruff check src/` and `uv run ruff format src/` before committing.
  - Use `uv run mypy src/` to verify type annotations.
  - Use `uv run pytest tests/specific_test.py -v` for targeted tests — never the full suite.
  - All functions must have type hints.
  - Follow PEP 8. Prefer dataclasses or Pydantic models over raw dicts.
  - Use async/await for I/O-bound operations where the codebase already uses async.
  - Handle errors explicitly — no bare `except:` clauses.

  CRITICAL RULES:
  - Do NOT call close_task — blocked by workflow. Only mark_task_needs_review.
  - Do NOT call git push — the merge agent handles pushing.
  - Do NOT stop or exit without calling kill_agent.
  - Always use `uv run` for Python commands.
  - Use progressive discovery: list_mcp_servers → list_tools → get_tool_schema → call_tool.

workflows:
  rule_selectors:
    include:
      - "tag:default"
      - "tag:worker-safety"
    exclude:
      - "tag:sync"
  skill_selectors:
    include:
      - "name:python-*"
      - "name:strict-python-mode"
    exclude: []

step_variables:
  task_claimed: false
  review_submitted: false

steps:
  - name: claim
    description: "Claim the assigned task"
    status_message: |
      Claim your task by calling claim_task with your assigned_task_id,
      then call get_task to read the full details.
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-tasks:claim_task"
      - "gobby-tasks:get_task"
    on_mcp_success:
      - server: gobby-tasks
        tool: claim_task
        action: set_variable
        variable: task_claimed
        value: true
    transitions:
      - to: implement
        when: "vars.task_claimed"

  - name: implement
    description: "Read code, implement changes, write tests, run tests, commit"
    status_message: |
      Implement the task. When done:
      1. Run `uv run ruff check src/` and `uv run mypy src/` to verify quality
      2. Run `uv run pytest tests/specific_test.py -v` to verify tests pass
      3. git add <files> && git commit -m "[gobby-#TASK_REF] description"
      4. Call mark_task_needs_review(task_id="...", session_id="<your Gobby Session ID>") to submit for QA review.
    allowed_tools: "all"
    blocked_mcp_tools:
      - "gobby-tasks:close_task"
      - "gobby-tasks:mark_task_review_approved"
      - "gobby-agents:spawn_agent"
      - "gobby-agents:kill_agent"
    on_mcp_success:
      - server: gobby-tasks
        tool: mark_task_needs_review
        action: set_variable
        variable: review_submitted
        value: true
    transitions:
      - to: terminate
        when: "vars.review_submitted"

  - name: terminate
    description: "Self-terminate by calling kill_agent"
    status_message: "Call kill_agent to terminate."
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-agents:kill_agent"

exit_condition: "current_step == 'terminate'"

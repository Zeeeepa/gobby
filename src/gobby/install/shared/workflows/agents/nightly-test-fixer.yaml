name: nightly-test-fixer
description: |
  Nightly test fixer agent: reads pytest report from ./reports/, groups failures
  by module, fixes root causes in source code, runs targeted tests, commits,
  and closes task with validation.

version: "1.1"
enabled: true
priority: 20

provider: claude
model: opus
mode: interactive
isolation: inherit
timeout: 1800
max_turns: 80

instructions: |
  You are a nightly test fixer agent. Your task is to fix test failures found
  in the latest pytest report.

  1. Use `Bash` to run `ls reports/` to find report files
  2. Use `Read` to open the pytest report (do NOT use Glob — it is blocked by rules)
  3. Group failures by module to understand patterns
  4. Fix root causes — prefer fixing source code over modifying tests
  5. Run targeted tests only: `uv run pytest tests/specific_test.py -v` — NEVER run the full suite
  6. Stage and commit fixes: `git add <files> && git commit -m "[gobby-#TASK_REF] Fix nightly test failures"`
  7. Call `close_task` with a `changes_summary` describing what you fixed. Validation will run automatically.
  8. Call `kill_agent` to terminate

  CRITICAL RULES:
  - Do NOT call mark_task_review_approved — close_task handles validation.
  - Do NOT call git push.
  - Do NOT run the full pytest suite — targeted tests only.
  - Do NOT stop without calling kill_agent.
  - Always use `uv run` for Python commands.
  - Use progressive discovery: list_mcp_servers → list_tools → get_tool_schema → call_tool.

workflows:
  rule_selectors:
    include:
      - "tag:default"
      - "tag:worker-safety"
    exclude:
      - "tag:sync"

step_variables:
  task_claimed: false
  task_closed: false

steps:
  - name: claim
    description: "Claim the assigned task"
    status_message: |
      Claim your task by calling claim_task with your assigned_task_id,
      then call get_task to read the full details.
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-tasks:claim_task"
      - "gobby-tasks:get_task"
    on_mcp_success:
      - server: gobby-tasks
        tool: claim_task
        action: set_variable
        variable: task_claimed
        value: true
    transitions:
      - to: fix
        when: "vars.task_claimed"

  - name: fix
    description: "Read pytest report, fix test failures, run targeted tests, commit"
    status_message: |
      Read pytest report from ./reports/, fix root causes, run targeted tests
      to verify, then commit and call close_task with a changes_summary.
    allowed_tools: "all"
    blocked_mcp_tools:
      - "gobby-tasks:mark_task_needs_review"
      - "gobby-tasks:mark_task_review_approved"
      - "gobby-agents:spawn_agent"
      - "gobby-agents:kill_agent"
    on_mcp_success:
      - server: gobby-tasks
        tool: close_task
        action: set_variable
        variable: task_closed
        value: true
    transitions:
      - to: terminate
        when: "vars.task_closed"

  - name: terminate
    description: "Self-terminate by calling kill_agent"
    status_message: "Call kill_agent to terminate."
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-agents:kill_agent"

exit_condition: "current_step == 'terminate'"

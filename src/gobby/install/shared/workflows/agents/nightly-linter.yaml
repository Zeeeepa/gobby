name: nightly-linter
description: |
  Nightly linter agent: reads ruff, mypy, and bandit reports from ./reports/,
  fixes errors, verifies fixes, commits, and closes task with validation.

version: "1.1"
enabled: true
priority: 20

provider: gemini
model: null
mode: terminal
isolation: inherit
timeout: 1200
max_turns: 50

instructions: |
  You are a nightly linter agent. Your task is to fix lint, type, and security
  errors found in the latest reports.

  1. Use `Bash` to run `ls reports/` to find report files
  2. Use `Read` to open ruff, mypy, and bandit reports (do NOT use Glob — it is blocked by rules)
  3. Fix errors in this order:
     a. **Ruff** first — run `uv run ruff check src/ --fix` for auto-fixable issues, then fix remaining manually
     b. **Mypy** — fix type annotation errors
     c. **Bandit** — fix security issues
  4. After fixing each category, run the tool to verify:
     `uv run ruff check src/`, `uv run mypy src/`, `uv run bandit -r src/ -c pyproject.toml`
  5. Stage and commit fixes: `git add <files> && git commit -m "[gobby-#TASK_REF] Fix nightly lint/type/security errors"`
  6. Call `close_task` with a `changes_summary` describing what you fixed. Validation will run automatically.
  7. Call `kill_agent` to terminate

  CRITICAL RULES:
  - Do NOT call mark_task_review_approved — close_task handles validation.
  - Do NOT call git push.
  - Do NOT stop without calling kill_agent.
  - Always use `uv run` for Python commands.
  - Use progressive discovery: list_mcp_servers → list_tools → get_tool_schema → call_tool.

workflows:
  rule_selectors:
    include:
      - "tag:default"
      - "tag:worker-safety"
    exclude:
      - "tag:sync"

step_variables:
  task_claimed: false
  task_closed: false

steps:
  - name: claim
    description: "Claim the assigned task"
    status_message: |
      Claim your task by calling claim_task with your assigned_task_id,
      then call get_task to read the full details.
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-tasks:claim_task"
      - "gobby-tasks:get_task"
    on_mcp_success:
      - server: gobby-tasks
        tool: claim_task
        action: set_variable
        variable: task_claimed
        value: true
    transitions:
      - to: fix
        when: "vars.task_claimed"

  - name: fix
    description: "Read reports, fix lint/type/security errors, run verification, commit"
    status_message: |
      Read reports from ./reports/, fix ruff/mypy/bandit errors, verify fixes,
      then commit and call close_task with a changes_summary.
    allowed_tools: "all"
    blocked_mcp_tools:
      - "gobby-tasks:mark_task_needs_review"
      - "gobby-tasks:mark_task_review_approved"
      - "gobby-agents:spawn_agent"
      - "gobby-agents:kill_agent"
    on_mcp_success:
      - server: gobby-tasks
        tool: close_task
        action: set_variable
        variable: task_closed
        value: true
    transitions:
      - to: terminate
        when: "vars.task_closed"

  - name: terminate
    description: "Self-terminate by calling kill_agent"
    status_message: "Call kill_agent to terminate."
    allowed_tools:
      - mcp__gobby__call_tool
      - mcp__gobby__list_mcp_servers
      - mcp__gobby__list_tools
      - mcp__gobby__get_tool_schema
    allowed_mcp_tools:
      - "gobby-agents:kill_agent"

exit_condition: "current_step == 'terminate'"

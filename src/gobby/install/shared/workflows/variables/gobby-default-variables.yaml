tags: [session-defaults, initialization]

variables:
  require_uv:
    value: true
    description: Default require_uv to true
  chat_mode:
    value: bypass
    description: Default chat_mode to bypass
  mode_level:
    value: 2
    description: Default mode_level to 2 (Full Auto)
  stop_attempts:
    value: 0
    description: Default stop_attempts to 0
  max_stop_attempts:
    value: 8
    description: Default max_stop_attempts to 8
  task_claimed:
    value: false
    description: Default task_claimed to false
  claimed_tasks:
    value: {}
    description: "Map of claimed task UUIDs to refs ({uuid: '#N'}) for this session"
  require_task_before_edit:
    value: true
    description: Default require_task_before_edit to true
  require_commit_before_status:
    value: true
    description: Default require_commit_before_status to true
  pre_existing_errors_triaged:
    value: false
    description: Default pre_existing_errors_triaged to false
  error_triage_blocks:
    value: 0
    description: "Count of times require-error-triage has blocked this session (circuit breaker at 3)"
  enforce_tdd:
    value: false
    description: "Enable TDD enforcement (block new code files until test is written first)"
  tdd_nudged_files:
    value: []
    description: "Files that have been TDD-nudged this session (internal)"
  tdd_tests_written:
    value: []
    description: "Test files written during TDD this session (internal)"
  enforce_tool_schema_check:
    value: true
    description: Default enforce_tool_schema_check to true
  auto_inject_handoff:
    value: true
    description: Default auto_inject_handoff to true (populate session_summary/full_session_summary template vars on session start)
  servers_listed:
    value: true
    description: "Pre-seed servers_listed (internal servers are known at startup)"
  listed_servers:
    value:
      - gobby-tasks
      - gobby-sessions
      - gobby-memory
      - gobby-workflows
      - gobby-canvas
      - gobby-metrics
      - gobby-agents
      - gobby-worktrees
      - gobby-clones
      - gobby-merge
      - gobby-hub
      - gobby-config
      - gobby-voice
      - gobby-skills
      - gobby-cron
    description: "Pre-seed listed_servers with internal server names"
  unlocked_tools:
    value: []
    description: Default unlocked_tools to empty list
  edit_write_pending:
    value: false
    description: "True when an Edit/Write tool call is pending (pre-tool fired, post-tool not yet succeeded)"
  edit_write_stop_blocks:
    value: 0
    description: "Circuit breaker counter for edit-write stop gate"

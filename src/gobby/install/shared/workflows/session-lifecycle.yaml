name: session-lifecycle
description: "Unified session lifecycle and behavior enforcement"
enabled: true
priority: 10 # Run first - critical for handoff before other LLM calls
sources: [claude, gemini, codex, antigravity, cursor, windsurf, copilot, claude_sdk, claude_sdk_web_chat]

# Workflow-scoped variables (behavior settings)
variables:
  # Debug: echo additionalContext to system_message for terminal visibility
  debug_echo_context: false

  # Task enforcement - require active task before file modifications
  require_task_before_edit: true

  # Task lifecycle policies

  # Block close_task until a commit is linked to the task
  require_commit_before_close: true

  # Clear task_claimed variable on successful close_task
  clear_task_on_close: true

  # Require uv for python/pip commands - block naked python3/pip via Bash
  require_uv: true

  # Progressive tool discovery - require get_tool_schema before call_tool
  # Set to false to disable this enforcement
  enforce_tool_schema_check: true

  # Max stop attempts before escape hatch
  max_stop_attempts: 3

# Session-scoped shared variables (visible to all workflows in the session)
# Reset on compact/clear since context is lost
session_variables:
  # Chat mode — controls tool approval behavior in web chat
  # Set via set_mode WebSocket message; default from config (chat.default_mode)
  chat_mode: plan

  # Numeric autonomy level — single source of truth for plan/act/auto mode
  # 0=Plan (read-only), 1=Act (approve edits), 2=Full Auto (bypass)
  mode_level: 0

  # List of server:tool combos that have been unlocked via get_tool_schema
  unlocked_tools: []

  # Progressive disclosure gates - track which discovery steps have occurred
  servers_listed: false
  listed_servers: []

  # Pre-existing error triage - require agents to create tasks for
  # pre-existing issues (test failures, lint errors, etc.) before stopping
  pre_existing_errors_triaged: false

  # Stop attempt counter for escape hatch
  # After 3 consecutive failed stops, allow force-stop
  stop_attempts: 0

observers:
  - name: mcp_call_history
    behavior: mcp_call_tracking

  on_session_start:
    # NOTE: reset_memory_injection_tracking moved to memory-lifecycle.yaml
    # NOTE: clear_pending_context_reset moved to context-handoff.yaml (clear-pending-context-reset-on-start rule)
    # NOTE: capture_baseline_dirty_files moved to context-handoff.yaml (capture-baseline-dirty-files-on-start rule)
    # NOTE: inject previous_session_summary moved to context-handoff.yaml (inject-previous-session-summary rule)
    # NOTE: inject compact_handoff moved to context-handoff.yaml (inject-compact-handoff rule)
    # NOTE: memory_sync_import moved to memory-lifecycle.yaml (memory-sync-import rule)
    # NOTE: task_sync_import moved to context-handoff.yaml (task-sync-import-on-start rule)
    # NOTE: inject skills moved to context-handoff.yaml (inject-skills-on-start rule)
    # NOTE: inject task_context moved to context-handoff.yaml (inject-task-context-on-start rule)
    # NOTE: inject error_triage_policy moved to context-handoff.yaml (inject-error-triage-policy rule)

  on_before_agent:
    # NOTE: memory_recall_with_synthesis moved to memory-lifecycle.yaml (memory-recall-on-prompt rule)
    # NOTE: memory_background_digest_and_synthesize moved to memory-lifecycle.yaml (memory-background-digest rule)
    # NOTE: memory-capture-nudge moved to memory-lifecycle.yaml

  on_after_tool:
    # NOTE: suggest-memory-after-close moved to memory-lifecycle.yaml

  on_session_end:
    # NOTE: generate_handoff moved to context-handoff.yaml (generate-handoff-on-end rule)
    # NOTE: memory_extract_from_session moved to memory-lifecycle.yaml (memory-extraction-on-end rule)
    # NOTE: memory_sync_export moved to memory-lifecycle.yaml (memory-sync-export-on-end rule)
    # NOTE: task_sync_export moved to context-handoff.yaml (task-sync-export-on-end rule)

  on_pre_compact:
    # Direct progressive disclosure resets
    # SDK clients don't get on_session_start, so they need direct resets here.
    # For CLI clients this is redundant (on_session_start also resets) but harmless.
    # Respects Gemini auto-compress skip (only reset on manual /compress or non-gemini)
    - action: set_variable
      when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
      name: unlocked_tools
      value: []
    - action: set_variable
      when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
      name: servers_listed
      value: false
    - action: set_variable
      when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
      name: listed_servers
      value: []
    # NOTE: reset_memory_injection_tracking moved to memory-lifecycle.yaml
    # NOTE: set pending_context_reset moved to context-handoff.yaml (set-pending-context-reset-on-compact rule)
    # NOTE: extract_handoff_context moved to context-handoff.yaml (extract-handoff-context-on-compact rule)
    # NOTE: memory_extract_from_session moved to memory-lifecycle.yaml (memory-extraction-on-compact rule)
    # NOTE: memory_sync_export moved to memory-lifecycle.yaml (memory-sync-export-on-compact rule)
    # NOTE: task_sync_export moved to context-handoff.yaml (task-sync-export-on-compact rule)
    # NOTE: generate_handoff moved to context-handoff.yaml (generate-handoff-on-compact rule)

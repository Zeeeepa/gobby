name: claude-sdk-lifecycle
description: "SDK client initialization — runs once on first agent turn for headless/SDK sources"
enabled: true
priority: 11 # After session-lifecycle (10)
sources: [claude_sdk, claude_sdk_web_chat]

# Workflow-scoped variables
variables:
  sdk_initialized: false

triggers:
  on_before_agent:
    # --- First-run init for SDK/headless clients ---
    # CLI clients receive on_session_start from session-lifecycle.yaml.
    # SDK clients never get session_start, so this block runs on their
    # first on_before_agent turn instead.
    - action: set_variable
      when: "not variables.get('sdk_initialized')"
      name: mode_level
      value: 2

    - action: capture_baseline_dirty_files
      when: "not variables.get('sdk_initialized')"

    - action: memory_sync_import
      when: "not variables.get('sdk_initialized')"

    - action: task_sync_import
      when: "not variables.get('sdk_initialized')"

    - action: inject_context
      when: "not variables.get('sdk_initialized')"
      template: |
        ## Session Context
        - Gobby Session ID: {{ ('#' ~ session.seq_num|string) if session.seq_num else session.id }} <- Use this for MCP tool calls (session_id parameter)
        - External ID: {{ session.external_id }} (CLI-native, rarely needed)
        - Source: {{ session.source }}

    - action: inject_context
      when: "not variables.get('sdk_initialized')"
      source: skills
      filter: always_apply
      template: |
        {{ skills_list }}

    - action: inject_context
      when: "not variables.get('sdk_initialized')"
      source: task_context
      template: |
        {{ task_context }}

    - action: inject_context
      when: "not variables.get('sdk_initialized')"
      template: |
        ## Pre-Existing Error/Warning/Failure Policy

        If you encounter ANY pre-existing issues during your work — errors,
        warnings, or failures (test failures, lint errors/warnings, type errors,
        build failures, deprecation warnings) unrelated to your changes — you
        MUST create a gobby task for each distinct issue before stopping.

        After triaging all issues (or confirming none were found), call
        set_variable on gobby-workflows:
        set_variable(name="pre_existing_errors_triaged", value=true, session_id="<session_id>")

    # Mark initialization complete (must be last init action)
    - action: set_variable
      when: "not variables.get('sdk_initialized')"
      name: sdk_initialized
      value: true

  on_pre_compact:
    # Reset so re-init fires after context loss
    - action: set_variable
      name: sdk_initialized
      value: false

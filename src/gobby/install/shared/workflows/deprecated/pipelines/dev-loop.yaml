name: dev-loop
type: pipeline
version: "3.0"
description: |
  Dev/QA loop for pre-expanded epics with pre-created worktrees.
  Scans task states, dispatches developer/QA agents, registers
  continuations for event-driven re-invocation.
  Merging is manual — the pipeline stops when all tasks are approved.

  Requires:
    - session_task: epic or task ID (already expanded with subtasks)
    - worktree_id OR clone_id: pre-created isolation resource
    - merge_target: target branch for merging

  Do NOT use wait_for_completion — use run_pipeline with
  continuation_prompt instead.

outputs:
  iteration: "${{ result.output.iteration }}"
  orchestration_complete: "${{ result.output.orchestration_complete }}"
  session_task: "${{ result.output.session_task }}"
  is_standalone: "${{ result.output.is_standalone }}"

inputs:
  session_task: null
  worktree_id: null
  clone_id: null
  merge_target: null
  developer_agent: "developer"
  qa_agent: "qa-reviewer"
  developer_provider: "claude"
  qa_provider: "claude"
  developer_model: null
  qa_model: null
  max_concurrent: 5
  max_iterations: 200
  _current_iteration: 0
  _continuation_prompt: null
  _dead_end_retries: 0
  _consecutive_failures: 0
  _last_agent_status: null

steps:
  # --- Guard ---
  - id: check_limit
    condition: "${{ inputs._current_iteration >= inputs.max_iterations }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "Max iterations reached (${{ inputs._current_iteration }}/${{ inputs.max_iterations }})"

  - id: check_failures
    condition: "${{ inputs._consecutive_failures >= 3 }}"
    mcp:
      server: gobby-workflows
      tool: fail_pipeline
      arguments:
        message: "3 consecutive agent failures (last status: ${{ inputs._last_agent_status }}). Escalate manually."

  - id: fetch_origin
    exec: "git fetch origin"

  # --- Scan child task states ---
  - id: scan_open
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "open"

  - id: scan_in_progress
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "in_progress"

  - id: scan_needs_review
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "needs_review"

  - id: scan_approved
    mcp:
      server: gobby-tasks
      tool: list_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        status: "review_approved"

  # --- Detect standalone vs epic ---
  - id: check_standalone
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          is_standalone: "${{ len(scan_open.output.tasks) + len(scan_in_progress.output.tasks) + len(scan_needs_review.output.tasks) + len(scan_approved.output.tasks) == 0 }}"

  # For standalone, get the task's own status
  - id: get_task_status
    condition: "${{ check_standalone.output.is_standalone }}"
    mcp:
      server: gobby-tasks
      tool: get_task
      arguments:
        task_id: "${{ inputs.session_task }}"

  # --- Check completion ---
  # Done when all tasks are approved or closed (merge is manual)
  - id: all_closed
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          done: >-
            ${{
              (check_standalone.output.is_standalone and get_task_status.output.status in ('closed', 'review_approved'))
              or
              (not check_standalone.output.is_standalone
               and len(scan_open.output.tasks) == 0
               and len(scan_in_progress.output.tasks) == 0
               and len(scan_needs_review.output.tasks) == 0)
            }}

  # --- Find next dispatchable tasks ---
  - id: find_next
    condition: "${{ (not all_closed.output.done) and (len(scan_in_progress.output.tasks) < inputs.max_concurrent) and (not check_standalone.output.is_standalone or get_task_status.output.status == 'open') }}"
    mcp:
      server: gobby-tasks
      tool: suggest_next_tasks
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"
        max_count: "${{ inputs.max_concurrent - len(scan_in_progress.output.tasks) }}"

  # --- DISPATCH DEVELOPERS ---
  - id: spawn_developers
    condition: "${{ len(find_next.output.suggestions) > 0 if find_next.output else false }}"
    mcp:
      server: gobby-agents
      tool: dispatch_batch
      arguments:
        suggestions: "${{ find_next.output.suggestions }}"
        agent: "${{ inputs.developer_agent }}"
        worktree_id: "${{ inputs.worktree_id }}"
        clone_id: "${{ inputs.clone_id }}"
        provider: "${{ inputs.developer_provider }}"
        model: "${{ inputs.developer_model }}"
        parent_session_id: "${{ session_id }}"
        mode: interactive

  # --- ANNOTATE OBSERVED FILES ---
  - id: annotate_observed
    condition: "${{ len(scan_needs_review.output.tasks) > 0 }}"
    mcp:
      server: gobby-tasks
      tool: update_observed_files
      arguments:
        task_id: "${{ scan_needs_review.output.tasks[0].id }}"

  # --- DISPATCH QA ---
  - id: spawn_qa
    condition: >-
      ${{
        (scan_needs_review.output.tasks[0].id if scan_needs_review.output and scan_needs_review.output.tasks else '')
        or
        (check_standalone.output.is_standalone and get_task_status.output.status == 'needs_review')
      }}
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "${{ 'Review and QA task ' + (scan_needs_review.output.tasks[0].ref if scan_needs_review.output and scan_needs_review.output.tasks else get_task_status.output.ref) }}"
        agent: "${{ inputs.qa_agent }}"
        task_id: "${{ scan_needs_review.output.tasks[0].id if scan_needs_review.output and scan_needs_review.output.tasks else get_task_status.output.id }}"
        worktree_id: "${{ inputs.worktree_id }}"
        clone_id: "${{ inputs.clone_id }}"
        provider: "${{ inputs.qa_provider }}"
        model: "${{ inputs.qa_model }}"
        parent_session_id: "${{ session_id }}"
        mode: interactive

  # --- REGISTER CONTINUATIONS ---
  - id: register_continuations
    condition: "${{ not all_closed.output.done }}"
    mcp:
      server: gobby-workflows
      tool: register_pipeline_continuation
      arguments:
        dispatch_outputs:
          developers: "${{ spawn_developers.output if spawn_developers.output else None }}"
          qa: "${{ spawn_qa.output if spawn_qa.output else None }}"
        pipeline_name: "dev-loop"
        session_id: "${{ session_id }}"
        continuation_prompt: "${{ inputs._continuation_prompt }}"
        inputs:
          _current_iteration: "${{ inputs._current_iteration + 1 }}"
          worktree_id: "${{ inputs.worktree_id }}"
          clone_id: "${{ inputs.clone_id }}"
          session_task: "${{ inputs.session_task }}"
          merge_target: "${{ inputs.merge_target }}"
          developer_agent: "${{ inputs.developer_agent }}"
          qa_agent: "${{ inputs.qa_agent }}"
          developer_provider: "${{ inputs.developer_provider }}"
          qa_provider: "${{ inputs.qa_provider }}"
          developer_model: "${{ inputs.developer_model }}"
          qa_model: "${{ inputs.qa_model }}"
          max_iterations: "${{ inputs.max_iterations }}"
          _continuation_prompt: "${{ inputs._continuation_prompt }}"
          _dead_end_retries: "${{ inputs._dead_end_retries }}"
          _consecutive_failures: "${{ inputs._consecutive_failures }}"
          _last_agent_status: "${{ inputs._last_agent_status }}"

  # --- RESULT ---
  - id: result
    mcp:
      server: gobby-workflows
      tool: pipeline_eval
      arguments:
        data:
          iteration: "${{ inputs._current_iteration }}"
          orchestration_complete: "${{ all_closed.output.done }}"
          session_task: "${{ inputs.session_task }}"
          is_standalone: "${{ check_standalone.output.is_standalone }}"

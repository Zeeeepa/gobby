name: session-lifecycle
description: Unified session lifecycle and behavior enforcement
enabled: true
priority: 10
sources:
- claude
- gemini
- codex
- antigravity
- cursor
- windsurf
- copilot
- claude_sdk
- claude_sdk_web_chat
variables:
  debug_echo_context: false
  require_task_before_edit: true
  require_commit_before_close: true
  clear_task_on_close: true
  require_uv: true
  enforce_tool_schema_check: true
  max_stop_attempts: 3
session_variables:
  chat_mode: plan
  mode_level: 0
  unlocked_tools: []
  servers_listed: false
  listed_servers: []
  pre_existing_errors_triaged: false
  stop_attempts: 0
observers:
- name: task_lifecycle
  behavior: task_claim_tracking
- name: plan_mode
  behavior: detect_plan_mode
- name: mcp_call_history
  behavior: mcp_call_tracking
triggers:
  on_stop:
  - action: increment_variable
    name: stop_attempts
  - action: block_stop
    when: variables.get('_tool_block_pending') and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts',
      3)
    reason: 'Do not stop. A tool was blocked — follow the instructions in the error message to resolve it, then continue working.

      '
  - action: block_stop
    when: task_has_commits and not variables.get('pre_existing_errors_triaged') and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts',
      3)
    reason: "You must triage pre-existing issues before stopping.\n- If you found errors, warnings, or failures unrelated\
      \ to your changes, create a task for each one.\n- If you found no pre-existing issues, confirm by calling\n  set_variable\
      \ on gobby-workflows:\n  set_variable(name=\"pre_existing_errors_triaged\", value=true, session_id=\"<session_id>\"\
      )\n"
  - action: memory_review_gate
    when: variables.get('pending_memory_review') and (variables.get('stop_attempts', 0) or 0) < 3
  - action: require_task_review_or_close_before_stop
    when: variables.get('mode_level', 2) >= 1 and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts', 3)
    messages:
      task_still_in_progress: 'Task {{ task_ref }} is still in_progress. Commit your changes and close it with close_task().

        Do NOT use mark_task_needs_review as a shortcut — only use needs_review when there is

        something genuinely critical the user must verify before closing.

        '
  on_session_start:
  - action: set_variable
    when: event.data.get('source') in ['clear', 'compact', 'startup']
    name: mode_level
    value: 2
  - action: set_variable
    when: event.data.get('source') in ['clear', 'compact'] or (event.data.get('source') == 'resume' and variables.get('pending_context_reset'))
    name: unlocked_tools
    value: []
  - action: set_variable
    when: event.data.get('source') in ['clear', 'compact'] or (event.data.get('source') == 'resume' and variables.get('pending_context_reset'))
    name: servers_listed
    value: false
  - action: set_variable
    when: event.data.get('source') in ['clear', 'compact'] or (event.data.get('source') == 'resume' and variables.get('pending_context_reset'))
    name: listed_servers
    value: []
  - action: reset_memory_injection_tracking
    when: event.data.get('source') in ['clear', 'compact'] or (event.data.get('source') == 'resume' and variables.get('pending_context_reset'))
  - action: set_variable
    when: variables.get('pending_context_reset')
    name: pending_context_reset
    value: false
  - action: capture_baseline_dirty_files
  - action: inject_context
    when: event.data.get('source') == 'clear'
    source: previous_session_summary
    require: true
    template: '## Previous Session Context

      *Injected by Gobby session handoff*


      {{ summary }}

      '
  - action: inject_context
    when: event.data.get('source') == 'compact'
    source: compact_handoff
    require: true
    template: '## Continuation Context

      *Injected by Gobby compact handoff*


      {{ handoff }}

      '
  - action: memory_sync_import
  - action: task_sync_import
  - action: inject_context
    when: event.data.get('source') != 'resume'
    source: skills
    filter: always_apply
    template: '{{ skills_list }}

      '
  - action: inject_context
    when: event.data.get('source') != 'resume'
    source: task_context
    template: '{{ task_context }}

      '
  - action: inject_context
    when: event.data.get('source') != 'resume'
    template: '## Pre-Existing Error/Warning/Failure Policy


      If you encounter ANY pre-existing issues during your work — errors,

      warnings, or failures (test failures, lint errors/warnings, type errors,

      build failures, deprecation warnings) unrelated to your changes — you

      MUST create a gobby task for each distinct issue before stopping.


      After triaging all issues (or confirming none were found), call

      set_variable on gobby-workflows:

      set_variable(name="pre_existing_errors_triaged", value=true, session_id="<session_id>")

      '
  on_before_agent:
  - action: set_variable
    name: stop_attempts
    value: 0
  - action: set_variable
    name: _tool_block_pending
    value: false
  - action: set_variable
    name: pre_existing_errors_triaged
    value: false
  - action: memory_recall_with_synthesis
    limit: 5
  - action: memory_background_digest_and_synthesize
    background: true
    limit: 20
  - action: inject_context
    when: len((event.data.get('prompt') or '').strip()) >= 10 and not (event.data.get('prompt') or '').strip().startswith('/')
    template: 'If the user just told you something worth remembering across sessions

      (a preference, fact, convention, or instruction), save it with

      create_memory on gobby-memory. If not, carry on.

      '
  on_before_tool:
  - action: block_tools
    rules:
    - tools:
      - TaskCreate
      - TaskUpdate
      - TaskGet
      - TaskList
      - TodoWrite
      reason: 'CC native task tools are disabled. Use gobby-tasks MCP tools instead:

        - create_task(title, description, session_id, claim=True) - Create and auto-claim new task.

        - claim_task(task_id, session_id) - Claim existing unclaimed task.

        - list_ready_tasks() - List available tasks.

        '
    - tools:
      - Edit
      - Write
      - NotebookEdit
      when: variables.get('require_task_before_edit') and not task_claimed and not (plan_mode and is_plan_file(tool_input.get('file_path',
        ''), source))
      reason: 'You must create or claim a task before editing files. This is required. DO NOT stop or ask the user - just
        create/claim a task and then retry your edit.

        - create_task(title, description, session_id, claim=True) - Create and auto-claim new task.

        - claim_task(task_id, session_id) - Claim existing unclaimed task.

        '
    - tools:
      - mcp__gobby__list_tools
      when: variables.get('enforce_tool_schema_check') and not variables.get('servers_listed')
      reason: 'Call list_mcp_servers() first to discover available servers, then retry list_tools.

        '
    - tools:
      - mcp__gobby__get_tool_schema
      when: variables.get('enforce_tool_schema_check') and not is_server_listed(tool_input)
      reason: 'Call list_tools(server_name="{{ tool_input.get(''server_name'', '''') }}") first, then retry get_tool_schema.

        '
    - tools:
      - mcp__gobby__call_tool
      when: variables.get('enforce_tool_schema_check') and tool_input.get('arguments') and not is_discovery_tool(tool_input.get('tool_name'))
        and not is_tool_unlocked(tool_input)
      reason: 'Schema required before calling call_tool("{{ tool_input.get(''server_name'', '''') }}", "{{ tool_input.get(''tool_name'')
        }}"). DO NOT stop or ask the user. Just call get_tool_schema("{{ tool_input.get(''server_name'', '''') }}", "{{ tool_input.get(''tool_name'')
        }}") now, then retry your call_tool immediately after.

        '
    - mcp_tools:
      - gobby-tasks:close_task
      when: variables.get('require_commit_before_close') and not task_has_commits and not tool_input.get('commit_sha') and
        tool_input.get('reason') not in ['already_implemented', 'obsolete', 'duplicate', 'wont_fix', 'out_of_repo']
      reason: 'A commit is required before closing this task.


        **Normal flow:**

        1. Commit your changes: git commit -m "[{{ project.name }}-#N] description"

        2. Close with commit_sha: close_task(task_id="#N", commit_sha="<sha>")


        **Edge cases (no work done):**

        - Task was already done: reason="already_implemented"

        - Task is no longer needed: reason="obsolete"

        - Task duplicates another: reason="duplicate"

        - Decided not to do it: reason="wont_fix"

        - Changes outside repo (e.g., ~/.gobby/bootstrap.yaml): reason="out_of_repo"

        '
    - mcp_tools:
      - gobby-tasks:close_task
      when: tool_input.get('skip_validation') and (task_has_commits or tool_input.get('commit_sha'))
      reason: 'skip_validation is not allowed when a commit is attached. If work was done, validation must run. Close the
        task without skip_validation.

        '
    - tools:
      - AskUserQuestion
      when: variables.get('stop_attempts', 0) > 0 and task_claimed
      reason: 'Do not ask — act on the hook directive. The stop hook told you what to do:

        1. Commit your changes: git commit -m "[{{ project.name }}-#N] description"

        2. Close the task: close_task(task_id="#N", commit_sha="<sha>")

        3. Then stop.

        '
    - tools:
      - Bash
      command_pattern: (?:^|[;&|])\s*(?:sudo\s+)?(?:python(?:3(?:\.\d+)?)?|pip3?)\b
      command_not_pattern: (?:^|[;&|])\s*(?:sudo\s+)?uv\s+
      when: variables.get('require_uv')
      reason: 'Do not run python or pip directly. Use `uv` to ensure the correct virtual environment:

        - `uv run python3 script.py` instead of `python3 script.py`

        - `uv run python -m module` instead of `python -m module`

        - `uv pip install pkg` or `uv add pkg` instead of `pip install pkg`

        Rewrite your command with `uv` and retry.

        '
  on_after_tool:
  - action: set_variable
    name: mode_level
    value: 0
    when: event.data.get('tool_name') == 'EnterPlanMode'
  - action: set_variable
    name: mode_level
    value: '{{ {''plan'': 0, ''accept_edits'': 1, ''normal'': 1}.get(variables.get(''chat_mode'', ''bypass''), 2) }}'
    when: event.data.get('tool_name') == 'ExitPlanMode'
  - action: set_variable
    name: stop_attempts
    value: 0
    when: not event.data.get('mcp_tool')
  - action: set_variable
    name: _tool_block_pending
    value: false
  - action: track_schema_lookup
  - action: track_discovery_step
  - action: set_variable
    when: event.data.get('tool_name') in ['Edit', 'Write', 'NotebookEdit'] or event.data.get('mcp_tool') == 'close_task'
    name: pending_memory_review
    value: true
  - action: inject_context
    when: event.data.get('mcp_tool') == 'close_task' and ((event.data.get('tool_input') or {}).get('arguments') or {}).get('commit_sha')
    template: 'Consider saving any valuable memories from this task before stopping.

      Use `create_memory` (via gobby-memory MCP) for insights worth preserving.

      If nothing new was learned, no action needed.

      '
  on_session_end:
  - action: generate_handoff
    include:
    - pending_tasks
    prompt: handoff/session_end
    write_file: true
  - action: memory_extract_from_session
    max_memories: 5
  - action: memory_sync_export
  - action: task_sync_export
  on_pre_compact:
  - action: set_variable
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
    name: unlocked_tools
    value: []
  - action: set_variable
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
    name: servers_listed
    value: false
  - action: set_variable
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
    name: listed_servers
    value: []
  - action: reset_memory_injection_tracking
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
  - action: set_variable
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
    name: pending_context_reset
    value: true
  - action: extract_handoff_context
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
  - action: memory_extract_from_session
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
    max_memories: 5
  - action: memory_sync_export
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
  - action: task_sync_export
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
  - action: generate_handoff
    when: event.source.value != 'gemini' or event.data.get('trigger') == 'manual'
    mode: compact
    prompt: handoff/compact
    write_file: true


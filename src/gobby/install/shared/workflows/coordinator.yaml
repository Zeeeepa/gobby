name: coordinator
type: pipeline
version: "2.0"
description: |
  Deterministic coordinator loop using MCP tools.
  Finds work, creates worktree, spawns developer/QA/merge agents,
  cleans up after each run, loops until no more ready tasks.

inputs:
  session_task: null
  developer_agent: "developer"
  qa_agent: "qa-reviewer"
  merge_agent: "merge"
  developer_provider: "claude"
  qa_provider: "claude"
  merge_provider: "claude"
  developer_model: null
  qa_model: null
  merge_model: null
  merge_target: "0.2.23"
  wait_timeout: 600
  max_iterations: 50
  _current_iteration: 0

steps:
  - id: check_limit
    condition: "${{ inputs._current_iteration >= inputs.max_iterations }}"
    exec: "echo 'ERROR: max iterations' && exit 1"

  - id: fetch_origin
    exec: "git fetch origin"

  - id: find_work
    mcp:
      server: gobby-tasks
      tool: suggest_next_task
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"

  - id: create_worktree
    condition: "${{ steps.find_work.output.suggestion.ref if steps.find_work.output and steps.find_work.output.suggestion else '' }}"
    mcp:
      server: gobby-worktrees
      tool: create_worktree
      arguments:
        branch_name: "task-${{ steps.find_work.output.suggestion.seq_num }}"
        base_branch: "${{ inputs.merge_target }}"
        task_id: "${{ steps.find_work.output.suggestion.id }}"

  - id: spawn_developer
    condition: "${{ steps.create_worktree.output.worktree_id if steps.create_worktree.output else '' }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Implement task ${{ steps.find_work.output.suggestion.ref }}: ${{ steps.find_work.output.suggestion.title }}"
        agent: "${{ inputs.developer_agent }}"
        workflow: developer
        task_id: "${{ steps.find_work.output.suggestion.id }}"
        worktree_id: "${{ steps.create_worktree.output.worktree_id }}"
        provider: "${{ inputs.developer_provider }}"
        model: "${{ inputs.developer_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  - id: wait_developer
    condition: "${{ steps.spawn_developer.output.run_id if steps.spawn_developer.output else '' }}"
    mcp:
      server: gobby-agents
      tool: wait_for_agent
      arguments:
        run_id: "${{ steps.spawn_developer.output.run_id }}"
        timeout: "${{ inputs.wait_timeout }}"
        kill_on_timeout: true

  - id: spawn_qa
    condition: "${{ steps.wait_developer.output.completed if steps.wait_developer.output and steps.wait_developer.output.completed else '' }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Review and fix code for task ${{ steps.find_work.output.suggestion.ref }}"
        agent: "${{ inputs.qa_agent }}"
        workflow: qa-reviewer
        task_id: "${{ steps.find_work.output.suggestion.id }}"
        worktree_id: "${{ steps.create_worktree.output.worktree_id }}"
        provider: "${{ inputs.qa_provider }}"
        model: "${{ inputs.qa_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  - id: wait_qa
    condition: "${{ steps.spawn_qa.output.run_id if steps.spawn_qa.output else '' }}"
    mcp:
      server: gobby-agents
      tool: wait_for_agent
      arguments:
        run_id: "${{ steps.spawn_qa.output.run_id }}"
        timeout: "${{ inputs.wait_timeout }}"
        kill_on_timeout: true

  - id: spawn_merge
    condition: "${{ steps.wait_qa.output.completed if steps.wait_qa.output and steps.wait_qa.output.completed else '' }}"
    mcp:
      server: gobby-agents
      tool: spawn_agent
      arguments:
        prompt: "Merge task ${{ steps.find_work.output.suggestion.ref }} into ${{ inputs.merge_target }}"
        agent: "${{ inputs.merge_agent }}"
        workflow: merge
        worktree_id: "${{ steps.create_worktree.output.worktree_id }}"
        provider: "${{ inputs.merge_provider }}"
        model: "${{ inputs.merge_model }}"
        parent_session_id: "${{ session_id }}"
        mode: terminal

  - id: wait_merge
    condition: "${{ steps.spawn_merge.output.run_id if steps.spawn_merge.output else '' }}"
    mcp:
      server: gobby-agents
      tool: wait_for_agent
      arguments:
        run_id: "${{ steps.spawn_merge.output.run_id }}"
        timeout: 300
        kill_on_timeout: true

  - id: close_task
    condition: "${{ steps.wait_merge.output.completed if steps.wait_merge.output and steps.wait_merge.output.completed else '' }}"
    mcp:
      server: gobby-tasks
      tool: close_task
      arguments:
        task_id: "${{ steps.find_work.output.suggestion.id }}"
        session_id: "${{ session_id }}"
        changes_summary: "Merged to ${{ inputs.merge_target }}"

  - id: cleanup_worktree
    condition: "${{ steps.create_worktree.output.worktree_id if steps.create_worktree.output else '' }}"
    mcp:
      server: gobby-worktrees
      tool: delete_worktree
      arguments:
        worktree_id: "${{ steps.create_worktree.output.worktree_id }}"
        force: true

  - id: check_more_work
    mcp:
      server: gobby-tasks
      tool: suggest_next_task
      arguments:
        parent_task_id: "${{ inputs.session_task }}"
        session_id: "${{ session_id }}"

  - id: next_iteration
    condition: "${{ steps.check_more_work.output.suggestion.ref if steps.check_more_work.output and steps.check_more_work.output.suggestion else '' }}"
    invoke_pipeline:
      name: coordinator
      arguments:
        _current_iteration: "${{ inputs._current_iteration + 1 }}"
        session_task: "${{ inputs.session_task }}"
        merge_target: "${{ inputs.merge_target }}"
        developer_agent: "${{ inputs.developer_agent }}"
        qa_agent: "${{ inputs.qa_agent }}"
        merge_agent: "${{ inputs.merge_agent }}"
        developer_provider: "${{ inputs.developer_provider }}"
        qa_provider: "${{ inputs.qa_provider }}"
        merge_provider: "${{ inputs.merge_provider }}"
        developer_model: "${{ inputs.developer_model }}"
        qa_model: "${{ inputs.qa_model }}"
        merge_model: "${{ inputs.merge_model }}"
        wait_timeout: "${{ inputs.wait_timeout }}"

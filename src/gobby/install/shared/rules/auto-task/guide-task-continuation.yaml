tags: [auto-task, task, autonomous, lifecycle]

rules:
  guide-task-continuation:
    description: "Block stop when task tree has incomplete subtasks"
    event: stop
    enabled: false
    priority: 45
    when: "variables.get('auto_task_ref') and not task_tree_complete(variables.get('auto_task_ref')) and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts', 8)"
    effect:
      type: block
      reason: |
        You are in an autonomous task execution mode.
        Task {{ auto_task_ref or '(unknown)' }} has incomplete subtasks. Use suggest_next_task() and continue working. 
        **DO NOT ask for user confirmation to proceed.**

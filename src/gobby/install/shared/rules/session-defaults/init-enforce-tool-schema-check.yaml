tags:
- session-defaults
- initialization
rules:
  init-enforce-tool-schema-check:
    description: Default enforce_tool_schema_check to true
    event: session_start
    enabled: false
    priority: 1
    when: variables.get('enforce_tool_schema_check') is None
    effect:
      type: set_variable
      variable: enforce_tool_schema_check
      value: true

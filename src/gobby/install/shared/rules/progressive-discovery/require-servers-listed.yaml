tags: [progressive-discovery, enforcement, mcp]

rules:
  require-servers-listed:
    description: "Block list_tools without prior list_mcp_servers"
    event: before_tool
    enabled: false
    priority: 20
    when: "variables.get('enforce_tool_schema_check') and not variables.get('servers_listed')"
    effect:
      type: block
      tools: ["mcp__gobby__list_tools"]
      reason: |
        Call list_mcp_servers() first, then retry.

        Steps: list_mcp_servers → list_tools → get_tool_schema → call_tool.

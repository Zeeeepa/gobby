tags: [progressive-discovery, enforcement, mcp]

rules:
  track-listed-servers:
    description: "Record which servers have been listed via list_tools"
    event: after_tool
    enabled: false
    priority: 22
    when: "event.data.get('mcp_tool') == 'list_tools' or event.data.get('tool_name') in ('list_tools', 'mcp__gobby__list_tools')"
    effect:
      type: set_variable
      variable: listed_servers
      value: "variables.get('listed_servers', []) + [tool_input.get('server_name', '')]"

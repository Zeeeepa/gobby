tags: [progressive-discovery, enforcement, mcp]

rules:
  require-schema-before-call:
    description: "Nudge to fetch schema before call_tool (proxy validates params on error)"
    event: before_tool
    enabled: false
    priority: 22
    when: "event.data.get('tool_name') in ('call_tool', 'mcp__gobby__call_tool') and not is_discovery_tool(tool_input.get('tool_name')) and not is_tool_unlocked(tool_input)"
    effect:
      type: inject_context
      template: |
        Note: Schema for {{ tool_input.get('server_name', '') }}/{{ tool_input.get('tool_name', '') }} was not fetched.
        If parameters are wrong, the error will include the full schema for self-correction.

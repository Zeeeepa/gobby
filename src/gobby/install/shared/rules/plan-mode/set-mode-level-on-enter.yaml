tags: [plan-mode, state-tracking]

rules:
  set-mode-level-on-enter:
    description: "Set mode_level=0 (plan) when entering plan mode"
    event: after_tool
    enabled: false
    priority: 11
    when: "event.data.get('tool_name') == 'EnterPlanMode'"
    effect:
      type: set_variable
      variable: mode_level
      value: 0

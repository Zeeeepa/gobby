tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  require-task-before-edit:
    description: "Block file edits without active task"
    event: before_tool
    enabled: false
    priority: 31
    when: "variables.get('require_task_before_edit') and not variables.get('task_claimed') and not is_plan_file(tool_input.get('file_path', ''), source) and not (variables.get('plan_mode') and tool_input.get('file_path', '').endswith('.md'))"
    effect:
      type: block
      tools: [Edit, Write, NotebookEdit]
      reason: |
        You must create or claim a task before editing files.
        - create_task(title, description, session_id, claim=True)
        - claim_task(task_id, session_id)

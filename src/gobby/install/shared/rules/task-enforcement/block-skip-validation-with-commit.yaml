tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  block-skip-validation-with-commit:
    description: "Block skip_validation when commits exist"
    event: before_tool
    enabled: false
    priority: 33
    when: "tool_input.get('skip_validation') and (variables.get('task_has_commits') or tool_input.get('commit_sha'))"
    effect:
      type: block
      mcp_tools: ["gobby-tasks:close_task"]
      reason: "skip_validation is not allowed when a commit is attached. Close without skip_validation."

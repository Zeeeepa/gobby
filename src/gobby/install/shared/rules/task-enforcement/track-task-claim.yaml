tags: [task-enforcement, enforcement, tasks, gobby, default]

rules:
  track-task-claim:
    description: "Log task claim events (state managed by detect_task_claim observer)"
    event: after_tool
    enabled: false
    priority: 30
    when: "event.data.get('mcp_tool') in ['claim_task', 'create_task'] and not event.data.get('error')"
    effect:
      type: observe

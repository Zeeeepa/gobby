tags: [context-handoff, context, handoff, lifecycle]

rules:
  generate-handoff-on-end:
    description: "Generate session handoff summary on session end"
    event: session_end
    enabled: false
    priority: 10
    effect:
      type: mcp_call
      server: gobby-sessions
      tool: set_handoff_context
      arguments:
        full: true
        write_file: true

tags: [context-handoff, context, handoff, lifecycle]

rules:
  prepare-clear-handoff:
    description: "Set handoff source when /clear or /exit detected"
    event: before_agent
    enabled: false
    priority: 5
    when: "event.data.get('prompt', '').strip().lower() in ('/clear', '/exit')"
    effects:
      - type: set_variable
        variable: handoff_source
        value: "clear"

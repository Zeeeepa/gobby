tags: [context-handoff, context, handoff, lifecycle]

rules:
  prepare-clear-handoff:
    description: "Prepare handoff context when /clear or /exit detected"
    event: before_agent
    enabled: false
    priority: 5
    when: "event.data.get('prompt', '').strip().lower() in ('/clear', '/exit')"
    effects:
      - type: set_variable
        variable: handoff_source
        value: "clear"
      - type: mcp_call
        server: gobby-sessions
        tool: set_handoff_context
        arguments:
          compact: true
      - type: mcp_call
        server: gobby-sessions
        tool: set_handoff_context
        arguments:
          full: true
          write_file: true

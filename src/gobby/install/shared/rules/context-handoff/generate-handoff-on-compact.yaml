tags: [context-handoff, context, handoff, lifecycle]

rules:
  generate-handoff-on-compact:
    description: "Generate LLM summary with cumulative compression before compaction"
    event: pre_compact
    enabled: false
    priority: 25
    when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
    effect:
      type: mcp_call
      server: gobby-sessions
      tool: generate_handoff
      arguments:
        mode: compact
        prompt: handoff/compact
        write_file: true

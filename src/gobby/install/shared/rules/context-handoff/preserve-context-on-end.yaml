tags: [context-handoff, context, handoff, lifecycle]

rules:
  preserve-context-on-end:
    description: "Extract memories and export data on session end"
    event: session_end
    enabled: false
    priority: 10
    effects:
      - type: mcp_call
        server: gobby-memory
        tool: extract_from_session
        arguments:
          max_memories: 5
      - type: mcp_call
        server: gobby-memory
        tool: sync_export
      - type: mcp_call
        server: gobby-tasks
        tool: sync_export

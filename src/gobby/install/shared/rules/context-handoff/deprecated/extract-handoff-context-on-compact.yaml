tags: [context-handoff, context, handoff, lifecycle]

rules:
  extract-handoff-context-on-compact:
    description: "Extract structured context before compaction"
    event: pre_compact
    enabled: false
    priority: 10
    when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
    effect:
      type: mcp_call
      server: gobby-sessions
      tool: set_handoff_context
      arguments:
        compact: true

tags: [context-handoff, context, handoff, lifecycle]

rules:
  inject-compact-handoff:
    description: "Inject compact handoff context after compaction"
    event: session_start
    enabled: false
    priority: 11
    when: "event.data.get('source') == 'compact'"
    effect:
      type: inject_context
      template: |
        ## Continuation Context
        *Injected by Gobby compact handoff*

        {{ compact_session_summary }}

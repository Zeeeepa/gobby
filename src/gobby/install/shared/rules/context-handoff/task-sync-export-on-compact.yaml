tags: [context-handoff, context, handoff, lifecycle]

rules:
  task-sync-export-on-compact:
    description: "Export tasks to JSONL before compaction"
    event: pre_compact
    enabled: false
    priority: 20
    when: "event.source.value != 'gemini' or event.data.get('trigger') == 'manual'"
    effect:
      type: mcp_call
      server: gobby-tasks
      tool: sync_export

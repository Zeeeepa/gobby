tags: [context-handoff, context, handoff, lifecycle]

rules:
  inject-skills-on-start:
    description: "Inject always-apply skills guide on session start (skip on resume)"
    event: session_start
    enabled: false
    priority: 30
    when: "event.data.get('source') != 'resume'"
    effect:
      type: inject_context
      template: |
        {{ skills_list }}

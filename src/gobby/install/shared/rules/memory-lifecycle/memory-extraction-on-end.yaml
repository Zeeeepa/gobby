tags: [memory-lifecycle, memory, lifecycle]

rules:
  memory-extraction-on-end:
    description: "Daemon-side memory extraction safety net on session end"
    event: session_end
    enabled: false
    priority: 20
    effect:
      type: mcp_call
      server: gobby-memory
      tool: extract_from_session
      arguments:
        max_memories: 5

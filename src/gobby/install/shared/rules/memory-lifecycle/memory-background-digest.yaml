tags: [memory-lifecycle, memory, lifecycle]

rules:
  memory-background-digest:
    description: "Update session digest and synthesize memories (async, zero latency)"
    event: before_agent
    enabled: false
    priority: 11
    effect:
      type: mcp_call
      server: gobby-memory
      tool: digest_and_synthesize
      arguments:
        limit: 20
      background: true

tags: [stop-gates, enforcement, lifecycle]

rules:
  block-stop-after-tool-block:
    description: "Block stop once when a tool was just blocked (self-clearing)"
    event: stop
    enabled: false
    priority: 20
    when: "variables.get('tool_block_pending')"
    effects:
      - type: set_variable
        variable: tool_block_pending
        value: false
      - type: block
        reason: "Do not stop. A tool was blocked — follow the instructions in the error message."

# Messaging rules - P2P message delivery and command coordination.
# Handles automatic message delivery, command activation, tool restrictions,
# and exit condition monitoring for inter-session agent coordination.

group: messaging
tags: [messaging, p2p, commands]

rules:
  # ─── Before Agent ───

  deliver-pending-messages:
    description: "Deliver pending inter-session messages on each agent turn"
    event: before_agent
    priority: 10
    effect:
      type: mcp_call
      server: gobby-agents
      tool: deliver_pending_messages

  activate-pending-command:
    description: "Activate a pending command when agent starts a turn"
    event: before_agent
    priority: 15
    when: "variables.get('has_pending_command')"
    effect:
      type: mcp_call
      server: gobby-agents
      tool: activate_command

  # ─── Before Tool ───

  command-tool-restriction:
    description: "Block tools not in the command's allowed_tools list"
    event: before_tool
    priority: 5
    when: >
      variables.get('command_id')
      and variables.get('allowed_tools')
      and event.data.get('tool_name') not in variables.get('allowed_tools', [])
    effect:
      type: block
      reason: "Tool not allowed by active command"

  # ─── After Tool ───

  command-exit-condition:
    description: "Auto-complete command when exit condition is met"
    event: after_tool
    priority: 90
    when: >
      variables.get('command_id')
      and variables.get('exit_condition_met')
    effect:
      type: mcp_call
      server: gobby-agents
      tool: complete_command

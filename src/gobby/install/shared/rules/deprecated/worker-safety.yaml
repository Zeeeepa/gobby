# Worker safety rules - common rules for agent workflows.
# Blocks dangerous operations: pushing, force-pushing, destructive git,
# and editing without a claimed task.

group: worker-safety

rules:
  no-push:
    description: "Block git push - let the parent session handle pushing."
    event: before_tool
    effect:
      type: block
      tools: [Bash]
      command_pattern: "git\\s+push"
      reason: "Do not push to remote. Let the parent session handle pushing."

  no-force-push:
    description: "Block force push - never allowed."
    event: before_tool
    effect:
      type: block
      tools: [Bash]
      command_pattern: "git\\s+push\\s+.*(?:--force(?:-with-lease|-if-includes)?|-f)(?:\\s|$)"
      reason: "Force pushing is never allowed."

  require-task:
    description: "Block file edits without a claimed task."
    event: before_tool
    when: "not variables.get('task_claimed') and not variables.get('plan_mode')"
    effect:
      type: block
      tools: [Edit, Write, NotebookEdit]
      reason: "Claim a task before editing files. Use claim_task() on gobby-tasks."

  no-destructive-git:
    description: "Block destructive git operations."
    event: before_tool
    effect:
      type: block
      tools: [Bash]
      command_pattern: "git\\s+(reset\\s+--hard|clean\\s+-f|checkout\\s+(--\\s+)?\\.|restore\\s+\\.)"
      reason: "Destructive git operations are not allowed without explicit approval."

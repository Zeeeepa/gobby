tags: [stop-gates, enforcement, lifecycle]

rules:
  require-error-triage:
    description: "Block stop until pre-existing errors are triaged"
    event: stop
    enabled: false
    priority: 30
    when: "(variables.get('task_has_commits') and not variables.get('pre_existing_errors_triaged')) and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts', 8)"
    effect:
      type: block
      reason: |
        Triage pre-existing issues before stopping. Any errors you find are *your* responsibility to triage. 
        Fix them if they are orthogonal to the task (code you touched won't pass CI),
        or confirm none via set_variable(name="pre_existing_errors_triaged", value=true).

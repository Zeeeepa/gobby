tags: [stop-gates, enforcement, lifecycle]

rules:
  reset-stop-on-native-tool:
    description: "Reset stop counter on successful native tool use"
    event: after_tool
    enabled: false
    priority: 80
    when: "not event.data.get('mcp_tool')"
    effect:
      type: set_variable
      variable: stop_attempts
      value: 0

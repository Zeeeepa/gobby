tags: [stop-gates, enforcement, lifecycle]

rules:
  memory-review-gate:
    description: "Block stop until memory review when significant work done"
    event: stop
    enabled: false
    priority: 40
    when: "variables.get('pending_memory_review') and (variables.get('stop_attempts', 0) or 0) < variables.get('max_stop_attempts', 8)"
    effect:
      type: block
      reason: |
        You've made significant changes this session. Before stopping,
        review and save valuable memories using create_memory on gobby-memory.
        Once you call create_memory, the gate will clear automatically.

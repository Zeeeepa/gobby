tags: [stop-gates, enforcement, lifecycle]

rules:
  require-task-close:
    description: "Block stop if task is still in_progress"
    event: stop
    enabled: false
    priority: 50
    when: "variables.get('mode_level', 2) >= 1 and variables.get('task_claimed') and variables.get('claimed_task_id') and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts', 3)"
    effect:
      type: block
      reason: |
        Task {{ claimed_task_id[:8] if claimed_task_id else '(unknown)' }} is still in_progress. Commit and close_task().

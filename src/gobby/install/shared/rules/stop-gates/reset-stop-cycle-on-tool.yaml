tags: [stop-gates, enforcement, lifecycle]

rules:
  reset-stop-cycle-on-tool:
    description: "Reset stop counter and tool block flag on any successful tool use"
    event: after_tool
    enabled: false
    priority: 80
    effects:
      - type: set_variable
        variable: stop_attempts
        value: 0
      - type: set_variable
        variable: tool_block_pending
        value: false

tags: [stop-gates, enforcement, lifecycle]

rules:
  reset-error-triage-on-prompt:
    description: "Reset triage flag on genuine new prompt (not stop-cycle feedback)"
    event: before_agent
    enabled: false
    priority: 12
    when: "variables.get('stop_attempts', 0) == 0"
    effect:
      type: set_variable
      variable: pre_existing_errors_triaged
      value: false

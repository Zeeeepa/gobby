tags: [progressive-disclosure, enforcement, mcp]

rules:
  track-schema-lookup:
    description: "Record get_tool_schema calls to unlock tools"
    event: after_tool
    enabled: false
    priority: 20
    when: "event.data.get('mcp_tool') == 'get_tool_schema' or event.data.get('tool_name') in ('get_tool_schema', 'mcp__gobby__get_tool_schema')"
    effect:
      type: set_variable
      variable: unlocked_tools
      value: "variables.get('unlocked_tools', []) + [tool_input.get('server_name', '') + ':' + tool_input.get('tool_name', '')]"

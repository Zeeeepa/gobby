# Auto-task rules - autonomous task execution via rules.
# Replaces the auto-task step workflow with 3 declarative rules:
# 1. Inject autonomous mode context when session_task is set
# 2. Block premature stops when task tree is incomplete
# 3. Notify when task tree is complete
#
# These rules are activated by setting session_task session variable.
# No step workflow activation needed.

group: auto-task
tags: [task, autonomous, lifecycle]

rules:
  # ─── Before Agent ───

  inject-autonomous-mode:
    description: "Inject autonomous task execution context when session_task is set"
    event: before_agent
    priority: 60
    when: "variables.get('session_task')"
    effect:
      type: inject_context
      template: |
        You are in autonomous task execution mode.

        Session task: {{ variables.session_task }}

        Work on this task and its subtasks until completion.
        Use suggest_next_task() to find available work.
        When all subtasks are closed, the task will be marked complete.

  notify-task-tree-complete:
    description: "Inject completion notice when task tree is fully closed"
    event: before_agent
    priority: 61
    when: "variables.get('session_task') and task_tree_complete(variables.get('session_task'))"
    effect:
      type: inject_context
      template: |
        Task complete! All subtasks for {{ variables.session_task }} have been closed.

        The auto-task workflow is now complete.
        You may stop the session or start a new task.

  # ─── Stop ───

  guide-task-continuation:
    description: "Block stop when task tree has incomplete subtasks"
    event: stop
    priority: 45
    when: "variables.get('session_task') and not task_tree_complete(variables.get('session_task')) and variables.get('stop_attempts', 0) < variables.get('max_stop_attempts', 3)"
    effect:
      type: block
      reason: "Task has incomplete subtasks. Use suggest_next_task() and continue working. Do not wait for user confirmation to proceed."

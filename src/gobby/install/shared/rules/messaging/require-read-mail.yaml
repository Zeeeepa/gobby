tags: [messaging, p2p, enforcement]

rules:
  require-read-mail:
    description: "Block all tools until agent reads pending inter-session messages"
    event: before_tool
    enabled: false
    priority: 8
    agent_scope: ["*"]
    when: >-
      has_pending_messages(event.metadata.get('_platform_session_id', ''))
      and not is_message_delivery_tool(event.data.get('mcp_tool'))
      and not is_discovery_tool(tool_input.get('tool_name'))
    effect:
      type: block
      reason: |
        You have {{ pending_message_count(event.metadata.get('_platform_session_id', '')) }} undelivered inter-session message(s). Read them before continuing.
        Call: deliver_pending_messages(session_id="{{ event.metadata.get('_platform_session_id', '') }}")

tags: [tool-hygiene, enforcement, testing]

rules:
  require-test-tools:
    description: "Block common test/lint/typecheck commands - use gobby-tests tools"
    event: before_tool
    enabled: false
    priority: 50
    effect:
      type: block
      tools: [Bash]
      command_pattern: "(?:uv\\s+run\\s+(?:pytest|mypy)|(?:npm|yarn|pnpm|bun)\\s+(?:run\\s+)?(?:test|lint|typecheck|type-check)|npx\\s+(?:vitest|jest|tsc|eslint)|cargo\\s+(?:test|clippy)|go\\s+(?:test|vet)|uv\\s+run\\s+ruff\\s+check(?!\\s+--fix))"
      command_not_pattern: "(?:uv\\s+run\\s+ruff\\s+(?:format|check\\s+--fix)|npm\\s+run\\s+(?:format|fix)|cargo\\s+fmt|go\\s+fmt)"
      reason: |
        Direct test/lint/typecheck via Bash wastes context tokens.
        Use gobby-tests MCP tools instead:
        - run_check(category="unit_tests")
        - run_check(category="lint")
        - run_check(category="type_check")
        - get_run_result(run_id, include_output=true) for raw output

        Available categories from your project.json verification section.

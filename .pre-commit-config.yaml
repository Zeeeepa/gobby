# Pre-commit hooks for Gobby
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

default_language_version:
  python: python3.13

# Fail fast on first error (set to false for CI)
fail_fast: false

repos:
  # ==========================================================================
  # Basic file hygiene
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^\.gobby/
      - id: end-of-file-fixer
        exclude: ^\.gobby/
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags
      - id: check-json
        exclude: ^\.gobby/
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-case-conflict

  # ==========================================================================
  # Security - secrets detection (pre-commit, read-only)
  # ==========================================================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # ==========================================================================
  # Code quality (pre-push) - agents lint before commit, this is the safety net
  # Moved from pre-commit to avoid auto-fix interference with concurrent agents
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # Linter - check only, no auto-fix (agents handle formatting)
      - id: ruff
        types_or: [python, pyi]
        stages: [pre-push]
      # Formatter - check only
      - id: ruff-format
        args: [--check]
        types_or: [python, pyi]
        stages: [pre-push]

  # Type checking (pre-push)
  # Uses `uv run` so mypy sees the full project environment and module graph.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false
        files: ^src/.*\.py$
        types: [python]
        stages: [pre-push]

  # ==========================================================================
  # Security checks (pre-push) - slower checks that run before pushing
  # These complement GitHub's CodeQL/Dependabot but catch issues locally
  # ==========================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        name: bandit (security linter)
        args: [-c, pyproject.toml, -r, src/]
        stages: [pre-push]

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (dependency CVEs)
        entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown"); if [ "$branch" = "main" ] || [ "$branch" = "dev" ]; then uv run pip-audit; else echo "Skipping pip-audit on branch $branch (only runs on main/dev)"; fi'
        language: system
        pass_filenames: false
        stages: [pre-push]
